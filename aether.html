    <script>
        (function() {
            // ==================== DOM引用 ====================
            const $ = (sel) => document.querySelector(sel);
            const $$ = (sel) => document.querySelectorAll(sel);

            const appContainer = $('#appContainer');
            const sidebar = $('#sidebar');
            const sidebarContent = $('#sidebarContent');
            const sidebarClose = $('#sidebarClose');
            const menuBtn = $('#menuBtn');
            const messagesContainer = $('#messagesContainer');
            const userInput = $('#userInput');
            const sendBtn = $('#sendBtn');
            const aiAvatarWrapper = $('#aiAvatarWrapper');
            const aiStatus = $('#aiStatus');
            const settingsBtn = $('#settingsBtn');
            const settingsModal = $('#settingsModal');
            const closeSettings = $('#closeSettings');
            const cancelSettings = $('#cancelSettings');
            const saveSettings = $('#saveSettings');
            const apiKeyInput = $('#apiKeyInput');
            const persistApiKeyToggle = $('#persistApiKeyToggle');
            const apiBaseInput = $('#apiBaseInput');
            const modelSelect = $('#modelSelect');
            const proxyInput = $('#proxyInput');
            const autoSaveToggle = $('#autoSaveToggle');
            const autoSaveInterval = $('#autoSaveInterval');
            const debugCodeToggle = $('#debugCodeToggle');
            const inputHint = $('#inputHint');
            const toastContainer = $('#toastContainer');
            const btnCleanExpired = $('#btnCleanExpired');
            const btnExportMem = $('#btnExportMem');
            const btnImportMem = $('#btnImportMem');
            const btnClearAllMem = $('#btnClearAllMem');
            const importFileInput = $('#importFileInput');

            // ==================== 状态 ====================
            let isProcessing = false;
            let conversationHistory = []; // 最近对话消息，旧消息会压缩到 conversationSummary
            let conversationSummary = '';
            const MAX_SHORT_TERM_ENTRIES = 50; // 短期记忆最多保留50条
            const MAX_STORED_CHAT_MESSAGES = 120;
            const MAX_API_HISTORY_MESSAGES = 24;
            const MAX_SUMMARY_ITEMS = 40;
            const DEBUG_LOGS = false;
            let autoSaveTimer = null; // 自动保存定时器
            let selectedMemory = null;

            // ==================== 存储键 ====================
            const STORAGE_KEYS = {
                SHORT_TERM: 'mem_short_term',
                LONG_TERM: 'mem_long_term',
                VOLATILE: 'mem_volatile',
                SETTINGS: 'app_settings',
                CHAT_HISTORY: 'chat_history_cache',
                SESSION_API_KEY: 'session_api_key',
            };

            function debugLog(...args) {
                if (DEBUG_LOGS) console.log(...args);
            }

            // ==================== 记忆系统 ====================
            class MemorySystem {
                constructor() {
                    this.loadAll();
                }

                loadAll() {
                    this.shortTerm = this._loadJSON(STORAGE_KEYS.SHORT_TERM, { entries: [] });
                    if (!Array.isArray(this.shortTerm.entries)) this.shortTerm.entries = [];
                    this.longTerm = this._loadJSON(STORAGE_KEYS.LONG_TERM, {
                        expenses: [],
                        preferences: [],
                        basicInfo: { age: null, job: null, pets: [], tools: [] },
                        aiLearning: [],
                        facts: [],
                    });
                    if (!Array.isArray(this.longTerm.expenses)) this.longTerm.expenses = [];
                    if (!Array.isArray(this.longTerm.preferences)) this.longTerm.preferences = [];
                    if (!Array.isArray(this.longTerm.aiLearning)) this.longTerm.aiLearning = [];
                    if (!Array.isArray(this.longTerm.facts)) this.longTerm.facts = [];
                    if (!this.longTerm.basicInfo || typeof this.longTerm.basicInfo !== 'object') {
                        this.longTerm.basicInfo = { age: null, job: null, pets: [], tools: [] };
                    }
                    if (!Array.isArray(this.longTerm.basicInfo.pets)) this.longTerm.basicInfo.pets = [];
                    if (!Array.isArray(this.longTerm.basicInfo.tools)) this.longTerm.basicInfo.tools = [];
                    this.volatile = this._loadJSON(STORAGE_KEYS.VOLATILE, {
                        plans: [],
                        temporaryEvents: [],
                    });
                    if (!Array.isArray(this.volatile.plans)) this.volatile.plans = [];
                    if (!Array.isArray(this.volatile.temporaryEvents)) this.volatile.temporaryEvents = [];
                    this._cleanExpired();
                    debugLog('🧠 记忆系统初始化完成:', {
                        shortTerm: this.shortTerm.entries.length,
                        longTerm: {
                            expenses: this.longTerm.expenses.length,
                            preferences: this.longTerm.preferences.length,
                            aiLearning: this.longTerm.aiLearning.length,
                        },
                        volatile: {
                            plans: this.volatile.plans.length,
                            temporaryEvents: this.volatile.temporaryEvents.length,
                        },
                    });
                }

                _loadJSON(key, defaultVal) {
                    try {
                        const raw = localStorage.getItem(key);
                        if (raw) return JSON.parse(raw);
                    } catch (e) { /* ignore */ }
                    return defaultVal;
                }

                _saveAll() {
                    try {
                        localStorage.setItem(STORAGE_KEYS.SHORT_TERM, JSON.stringify(this.shortTerm));
                        localStorage.setItem(STORAGE_KEYS.LONG_TERM, JSON.stringify(this.longTerm));
                        localStorage.setItem(STORAGE_KEYS.VOLATILE, JSON.stringify(this.volatile));
                    } catch (e) {
                        console.warn('记忆存储空间不足', e);
                        this._cleanExpired();
                        try {
                            localStorage.setItem(STORAGE_KEYS.SHORT_TERM, JSON.stringify(this.shortTerm));
                            localStorage.setItem(STORAGE_KEYS.LONG_TERM, JSON.stringify(this.longTerm));
                            localStorage.setItem(STORAGE_KEYS.VOLATILE, JSON.stringify(this.volatile));
                        } catch (e2) {
                            console.error('记忆存储失败', e2);
                        }
                    }
                }

                /** 清理过期记忆 */
                _cleanExpired() {
                    const now = Date.now();
                    const sevenDays = 7 * 24 * 60 * 60 * 1000;

                    // 短期记忆：优先按 expiresAt，否则按 timestamp + 7天
                    this.shortTerm.entries = (this.shortTerm.entries || []).filter(e => {
                        const expiry = e.expiresAt || ((e.timestamp || 0) + sevenDays);
                        return now < expiry;
                    });

                    // 波动记忆 - 临时事件：按估计过期时间清理
                    this.volatile.temporaryEvents = (this.volatile.temporaryEvents || []).filter(e =>
                        this._isTempEventActive(e, now)
                    );

                    // 波动记忆 - 计划：不过期，等待用户主动删除
                    // （计划类记忆不自动过期，由用户指示删除）
                }

                /** 短期记忆 - 添加条目 */
                addShortTerm(content, source = 'dialogue') {
                    // 提取关键信息后存储（精简）
                    const trimmed = this._extractKeyInfo(content);
                    if (!trimmed || trimmed.length < 2) return;

                    // 检查重复
                    const existing = this.shortTerm.entries.find(e =>
                        this._similarity(e.content, trimmed) > 0.75
                    );
                    if (existing) {
                        // 整合：更新时间和内容
                        existing.content = this._mergeContent(existing.content, trimmed);
                        existing.timestamp = Date.now();
                        existing.expiresAt = Date.now() + 7 * 24 * 60 * 60 * 1000;
                    } else {
                        this.shortTerm.entries.push({
                            content: trimmed,
                            timestamp: Date.now(),
                            expiresAt: Date.now() + 7 * 24 * 60 * 60 * 1000,
                            source,
                        });
                    }
                    // 限制短期记忆条目数（最多50条，超出则丢弃最旧的）
                    if (this.shortTerm.entries.length > MAX_SHORT_TERM_ENTRIES) {
                        this.shortTerm.entries.sort((a, b) => b.timestamp - a.timestamp);
                        this.shortTerm.entries = this.shortTerm.entries.slice(0, MAX_SHORT_TERM_ENTRIES);
                    }
                    this._saveAll();
                }

                /** 长期记忆 - 添加开销 */
                addExpense(amount, category, description) {
                    if (!amount && !description) return;
                    const entry = {
                        amount: amount || null,
                        category: category || '未分类',
                        description: description || '',
                        timestamp: Date.now(),
                        dateStr: new Date().toISOString().split('T')[0],
                    };
                    // 检查重复（同一天相同金额和描述）
                    const dup = this.longTerm.expenses.find(e =>
                        e.dateStr === entry.dateStr &&
                        e.amount === entry.amount &&
                        this._similarity(e.description, entry.description) > 0.8
                    );
                    if (!dup) {
                        this.longTerm.expenses.push(entry);
                    }
                    this._saveAll();
                }

                /** 长期记忆 - 添加用户喜好 */
                addPreference(category, detail) {
                    if (!detail) return;
                    const entry = { category: category || '通用', detail, timestamp: Date.now() };
                    const dup = this.longTerm.preferences.find(p =>
                        p.category === entry.category && this._similarity(p.detail, entry.detail) > 0.7
                    );
                    if (dup) {
                        dup.detail = entry.detail; // 覆盖
                        dup.timestamp = Date.now();
                    } else {
                        this.longTerm.preferences.push(entry);
                    }
                    this._saveAll();
                }

                /** 长期记忆 - 更新基本信息 */
                updateBasicInfo(field, value) {
                    if (field === 'pets' && typeof value === 'object') {
                        // value: {name, type, action: 'add'|'remove'}
                        if (value.action === 'add' && value.name) {
                            const exists = this.longTerm.basicInfo.pets.find(p =>
                                p.name === value.name && p.type === value.type
                            );
                            if (!exists) this.longTerm.basicInfo.pets.push({ name: value.name, type: value
                                    .type || '未知' });
                        } else if (value.action === 'remove' && value.name) {
                            this.longTerm.basicInfo.pets = this.longTerm.basicInfo.pets.filter(p =>
                                p.name !== value.name
                            );
                        }
                    } else if (field === 'tools' && typeof value === 'object') {
                        if (value.action === 'add' && value.tool) {
                            if (!this.longTerm.basicInfo.tools.includes(value.tool)) {
                                this.longTerm.basicInfo.tools.push(value.tool);
                            }
                        } else if (value.action === 'remove' && value.tool) {
                            this.longTerm.basicInfo.tools = this.longTerm.basicInfo.tools.filter(t =>
                                t !== value.tool
                            );
                        }
                    } else {
                        this.longTerm.basicInfo[field] = value;
                    }
                    this._saveAll();
                }

                /** 长期记忆 - AI学习板块 */
                addAiLearning(topic, content) {
                    if (!topic || !content) return;
                    const entry = { topic, content, timestamp: Date.now() };
                    const dup = this.longTerm.aiLearning.find(l =>
                        this._similarity(l.topic, topic) > 0.7
                    );
                    if (dup) {
                        dup.content = this._mergeContent(dup.content, content);
                        dup.timestamp = Date.now();
                    } else {
                        this.longTerm.aiLearning.push(entry);
                    }
                    this._saveAll();
                }

                /** 长期记忆 - 通用事实 */
                addLongTermFact(category, content) {
                    if (!content || typeof content !== 'string' || !content.trim()) return;
                    const entry = {
                        category: category || '通用',
                        content: content.trim(),
                        timestamp: Date.now(),
                    };
                    const dup = this.longTerm.facts.find(f =>
                        f.category === entry.category && this._similarity(f.content, entry.content) > 0.7
                    );
                    if (dup) {
                        dup.content = this._mergeContent(dup.content, entry.content);
                        dup.timestamp = Date.now();
                    } else {
                        this.longTerm.facts.push(entry);
                    }
                    this._saveAll();
                }

                /** 波动记忆 - 添加计划 */
                addPlan(type, content) {
                    if (!content || typeof content !== 'string' || !content.trim()) return;
                    const entry = {
                        type: type || '其他',
                        content: content.trim(),
                        createdAt: Date.now(),
                        deleteCondition: 'user_indicated',
                    };
                    // 检查重复
                    const dup = this.volatile.plans.find(p =>
                        p.type === entry.type && this._similarity(p.content, entry.content) > 0.7
                    );
                    if (dup) {
                        dup.content = entry.content;
                        dup.createdAt = Date.now();
                    } else {
                        this.volatile.plans.push(entry);
                    }
                    this._saveAll();
                    debugLog('📝 计划已添加:', type, content, '当前计划数:', this.volatile.plans.length);
                }

                /** 波动记忆 - 添加临时事件 */
                addTemporaryEvent(content, estimatedExpiry) {
                    if (!content || typeof content !== 'string' || !content.trim()) return;
                    debugLog('📝 开始添加临时事件:', { content, estimatedExpiry });
                    const entry = {
                        content: content.trim(),
                        createdAt: Date.now(),
                        estimatedExpiry: this._normalizeExpiry(estimatedExpiry),
                    };
                    const dup = this.volatile.temporaryEvents.find(e =>
                        this._similarity(e.content, entry.content) > 0.7
                    );
                    if (dup) {
                        dup.estimatedExpiry = entry.estimatedExpiry;
                        dup.createdAt = Date.now();
                    } else {
                        this.volatile.temporaryEvents.push(entry);
                    }
                    this._saveAll();
                    debugLog('📝 临时事件保存成功，当前数量:', this.volatile.temporaryEvents.length);
                }

                /** 兼容解析 AI 可见回复中的自然语言记忆确认 */
                parseMemoryUpdate(content) {
                    if (!content || typeof content !== 'string') return false;
                    const text = content.trim();
                    if (!/已存入波动记忆|临时事件/.test(text)) return false;

                    if (!this.volatile) this.volatile = {};
                    if (!Array.isArray(this.volatile.temporaryEvents)) this.volatile.temporaryEvents = [];

                    const expiryMatch = text.match(/(\d{1,2}\s*月\s*\d{1,2}\s*日)[^。；;\n]*(?:自动删除|删除|过期|失效)/);
                    const estimatedExpiry = expiryMatch ? expiryMatch[1].replace(/\s+/g, '') : undefined;
                    const events = [];
                    const eventRegex = /临时事件\s*[：:]\s*([^。；;\n]+)/g;
                    let match;
                    while ((match = eventRegex.exec(text)) !== null) {
                        const item = match[1].trim();
                        if (item) events.push(item);
                    }

                    if (events.length === 0 && /已存入波动记忆/.test(text)) {
                        const fallback = text
                            .replace(/已存入波动记忆[，,。；;\s]*/g, '')
                            .replace(/\d{1,2}\s*月\s*\d{1,2}\s*日[^。；;\n]*(?:自动删除|删除|过期|失效)[。；;\s]*/g, '')
                            .trim();
                        if (fallback) events.push(fallback);
                    }

                    events.forEach(item => this.addTemporaryEvent(item, estimatedExpiry));
                    if (events.length > 0 && typeof window.updateMemoryPanel === 'function') {
                        window.updateMemoryPanel();
                    }
                    return events.length > 0;
                }

                /** 删除波动记忆中的计划 */
                removePlan(indexOrContent) {
                    if (typeof indexOrContent === 'number') {
                        this.volatile.plans.splice(indexOrContent, 1);
                    } else {
                        this.volatile.plans = this.volatile.plans.filter(p =>
                            !this._matchesMemoryTarget(p, indexOrContent)
                        );
                    }
                    this._saveAll();
                }

                /** 删除波动记忆中的临时事件 */
                removeTemporaryEvent(indexOrContent) {
                    if (typeof indexOrContent === 'number') {
                        this.volatile.temporaryEvents.splice(indexOrContent, 1);
                    } else {
                        this.volatile.temporaryEvents = this.volatile.temporaryEvents.filter(e =>
                            !this._matchesMemoryTarget(e, indexOrContent)
                        );
                    }
                    this._saveAll();
                }

                _textForMatch(value) {
                    if (value == null) return '';
                    if (typeof value === 'string' || typeof value === 'number') return String(value);
                    if (Array.isArray(value)) return value.map(v => this._textForMatch(v)).filter(Boolean).join(' ');
                    if (typeof value === 'object') {
                        return Object.keys(value)
                            .filter(key => !['scope', 'memoryType', 'section', 'kind', 'action'].includes(key))
                            .map(key => this._textForMatch(value[key]))
                            .filter(Boolean)
                            .join(' ');
                    }
                    return '';
                }

                _matchesMemoryTarget(item, target) {
                    if (target == null) return false;
                    const itemText = this._textForMatch(item).trim();
                    const targetText = this._textForMatch(target).trim();
                    if (!itemText || !targetText) return false;

                    if (typeof target === 'object' && !Array.isArray(target)) {
                        const targetCategory = target.category || target.type || target.topic;
                        if (targetCategory) {
                            const itemCategory = item && typeof item === 'object'
                                ? (item.category || item.type || item.topic || '')
                                : '';
                            if (itemCategory && itemCategory !== targetCategory) return false;
                        }
                    }

                    return itemText.includes(targetText) ||
                        targetText.includes(itemText) ||
                        this._similarity(itemText, targetText) > 0.62;
                }

                removeShortTerm(target) {
                    if (typeof target === 'number') {
                        this.shortTerm.entries.splice(target, 1);
                    } else {
                        this.shortTerm.entries = (this.shortTerm.entries || []).filter(e =>
                            !this._matchesMemoryTarget(e, target)
                        );
                    }
                    this._saveAll();
                }

                removeBasicInfo(target) {
                    const targets = Array.isArray(target) ? target : [target];
                    targets.forEach(item => {
                        if (typeof item === 'string') {
                            if (Object.prototype.hasOwnProperty.call(this.longTerm.basicInfo, item)) {
                                if (Array.isArray(this.longTerm.basicInfo[item])) this.longTerm.basicInfo[item] = [];
                                else this.longTerm.basicInfo[item] = null;
                                return;
                            }
                        }
                        const field = item && typeof item === 'object' ? (item.field || item.key || item.name) : null;
                        const value = item && typeof item === 'object' ? (item.value || item.content || item.detail || item.tool) : item;
                        if (field && Object.prototype.hasOwnProperty.call(this.longTerm.basicInfo, field)) {
                            if (Array.isArray(this.longTerm.basicInfo[field])) {
                                this.longTerm.basicInfo[field] = this.longTerm.basicInfo[field].filter(existing =>
                                    !this._matchesMemoryTarget(existing, value || item)
                                );
                            } else {
                                this.longTerm.basicInfo[field] = null;
                            }
                            return;
                        }

                        Object.keys(this.longTerm.basicInfo).forEach(key => {
                            const current = this.longTerm.basicInfo[key];
                            if (Array.isArray(current)) {
                                this.longTerm.basicInfo[key] = current.filter(existing =>
                                    !this._matchesMemoryTarget(existing, item)
                                );
                            } else if (this._matchesMemoryTarget(current, item)) {
                                this.longTerm.basicInfo[key] = null;
                            }
                        });
                    });
                    this._saveAll();
                }

                removeLongTermMemory(target) {
                    const targets = Array.isArray(target) ? target : [target];
                    targets.forEach(item => {
                        const scope = item && typeof item === 'object'
                            ? (item.scope || item.memoryType || item.section || item.kind || '')
                            : '';
                        const shouldCheck = (...names) => !scope || scope === 'all' || names.includes(scope);

                        if (shouldCheck('preference', 'preferences', 'longTerm')) {
                            this.longTerm.preferences = (this.longTerm.preferences || []).filter(p =>
                                !this._matchesMemoryTarget(p, item)
                            );
                        }
                        if (shouldCheck('fact', 'facts', 'longTerm')) {
                            this.longTerm.facts = (this.longTerm.facts || []).filter(f =>
                                !this._matchesMemoryTarget(f, item)
                            );
                        }
                        if (shouldCheck('aiLearning', 'learning', 'longTerm')) {
                            this.longTerm.aiLearning = (this.longTerm.aiLearning || []).filter(l =>
                                !this._matchesMemoryTarget(l, item)
                            );
                        }
                        if (shouldCheck('expense', 'expenses', 'longTerm')) {
                            this.longTerm.expenses = (this.longTerm.expenses || []).filter(e =>
                                !this._matchesMemoryTarget(e, item)
                            );
                        }
                        if (shouldCheck('basicInfo', 'profile', 'longTerm')) {
                            this.removeBasicInfo(item);
                        }
                    });
                    this._saveAll();
                }

                removeVolatileMemory(target) {
                    const targets = Array.isArray(target) ? target : [target];
                    targets.forEach(item => {
                        const scope = item && typeof item === 'object'
                            ? (item.scope || item.memoryType || item.section || item.kind || '')
                            : '';
                        if (!scope || scope === 'all' || ['plan', 'plans', 'volatile'].includes(scope)) {
                            this.volatile.plans = (this.volatile.plans || []).filter(p =>
                                !this._matchesMemoryTarget(p, item)
                            );
                        }
                        if (!scope || scope === 'all' || ['temporaryEvent', 'temporaryEvents', 'tempEvent', 'event', 'volatile'].includes(scope)) {
                            this.volatile.temporaryEvents = (this.volatile.temporaryEvents || []).filter(e =>
                                !this._matchesMemoryTarget(e, item)
                            );
                        }
                    });
                    this._saveAll();
                }

                removeMemory(target) {
                    const targets = Array.isArray(target) ? target : [target];
                    targets.forEach(item => {
                        const scope = item && typeof item === 'object'
                            ? (item.scope || item.memoryType || item.section || item.kind || '')
                            : '';
                        if (!scope || ['shortTerm', 'short', 'all'].includes(scope)) this.removeShortTerm(item);
                        if (!scope || ['longTerm', 'long', 'all'].includes(scope)) this.removeLongTermMemory(item);
                        if (!scope || ['volatile', 'plan', 'plans', 'temporaryEvent', 'temporaryEvents', 'all'].includes(scope)) {
                            this.removeVolatileMemory(item);
                        }
                    });
                    this._saveAll();
                }

                /** 用户否定时修改记忆 */
                handleUserNegation(negatedTopic) {
                    // 在短期记忆中查找并移除相关内容
                    this.shortTerm.entries = this.shortTerm.entries.filter(e =>
                        !this._matchesMemoryTarget(e, negatedTopic)
                    );
                    // 在长期记忆的喜好中查找
                    this.longTerm.preferences = this.longTerm.preferences.filter(p =>
                        !this._matchesMemoryTarget(p, negatedTopic)
                    );
                    // 在AI学习中查找
                    this.longTerm.aiLearning = this.longTerm.aiLearning.filter(l =>
                        !this._matchesMemoryTarget(l, negatedTopic)
                    );
                    // 在长期事实中查找
                    this.longTerm.facts = (this.longTerm.facts || []).filter(f =>
                        !this._matchesMemoryTarget(f, negatedTopic)
                    );
                    // 在开销记录中查找
                    this.longTerm.expenses = (this.longTerm.expenses || []).filter(e =>
                        !this._matchesMemoryTarget(e, negatedTopic)
                    );
                    // 在波动记忆计划中查找
                    this.volatile.plans = this.volatile.plans.filter(p =>
                        !this._matchesMemoryTarget(p, negatedTopic)
                    );
                    // 在波动记忆临时事件中查找
                    this.volatile.temporaryEvents = this.volatile.temporaryEvents.filter(e =>
                        !this._matchesMemoryTarget(e, negatedTopic)
                    );
                    this._saveAll();
                }

                /** 提取关键信息（精简） */
                _extractKeyInfo(text) {
                    if (!text) return '';
                    // 去除过短或无明显信息的内容
                    let cleaned = text.replace(/[嗯啊哦诶嘿哈呀]+/g, '').trim();
                    if (cleaned.length < 3) return cleaned;
                    // 限制长度
                    if (cleaned.length > 300) cleaned = cleaned.substring(0, 280) + '...';
                    return cleaned;
                }

                /** 将 AI 可能返回的多种时间格式统一为毫秒时间戳 */
                _normalizeExpiry(value) {
                    if (value == null || value === '') return null;
                    if (typeof value === 'number' && !isNaN(value)) {
                        // 小于 1e12 视为秒级时间戳，转换为毫秒
                        return value < 1e12 ? value * 1000 : value;
                    }
                    const parsed = Date.parse(String(value));
                    return isNaN(parsed) ? null : parsed;
                }

                _isTempEventActive(event, now = Date.now()) {
                    const expiry = this._normalizeExpiry(event && event.estimatedExpiry);
                    return !expiry || now < expiry;
                }

                /** 简单相似度检测 */
                _similarity(a, b) {
                    if (!a || !b) return 0;
                    const shorter = a.length < b.length ? a : b;
                    const longer = a.length < b.length ? b : a;
                    if (shorter.length === 0) return 0;
                    let matches = 0;
                    const wordsA = new Set(shorter.split(/[\s,，。！？、]+/).filter(w => w.length > 1));
                    const wordsB = longer.split(/[\s,，。！？、]+/).filter(w => w.length > 1);
                    for (const w of wordsB) {
                        if (wordsA.has(w)) matches++;
                    }
                    return wordsA.size > 0 ? matches / Math.max(wordsA.size, wordsB.length) : 0;
                }

                /** 合并内容 */
                _mergeContent(oldContent, newContent) {
                    if (newContent.length > oldContent.length) return newContent;
                    if (oldContent.includes(newContent)) return oldContent;
                    return oldContent + '；' + newContent;
                }

                /** 获取记忆摘要（用于系统提示） */
                getMemorySummary() {
                    const parts = [];
                    // 长期记忆 - 基本信息
                    const bi = this.longTerm.basicInfo;
                    const biParts = [];
                    if (bi.age) biParts.push(`年龄:${bi.age}`);
                    if (bi.job) biParts.push(`工作:${bi.job}`);
                    if (bi.pets && bi.pets.length > 0) {
                        biParts.push('宠物:' + bi.pets.map(p => `${p.name}(${p.type})`).join(', '));
                    }
                    if (bi.tools && bi.tools.length > 0) {
                        biParts.push('工具:' + bi.tools.join(', '));
                    }
                    if (biParts.length > 0) parts.push('【用户基本信息】' + biParts.join('；'));

                    // 长期记忆 - 喜好
                    if (this.longTerm.preferences.length > 0) {
                        const prefStr = this.longTerm.preferences
                            .slice(-10)
                            .map(p => `[${p.category}]${p.detail}`)
                            .join('；');
                        parts.push('【用户喜好】' + prefStr);
                    }

                    // 长期记忆 - AI学习
                    if (this.longTerm.aiLearning.length > 0) {
                        const learnStr = this.longTerm.aiLearning
                            .slice(-8)
                            .map(l => `[${l.topic}]${l.content}`)
                            .join('；');
                        parts.push('【AI已学习内容】' + learnStr);
                    }

                    // 长期记忆 - 通用事实
                    if ((this.longTerm.facts || []).length > 0) {
                        const factStr = this.longTerm.facts
                            .slice(-10)
                            .map(f => `[${f.category || '通用'}]${f.content}`)
                            .join('；');
                        parts.push('【长期事实】' + factStr);
                    }

                    // 短期记忆（最近）
                    const recentShort = (this.shortTerm.entries || [])
                        .slice(-15)
                        .map(e => e.content)
                        .join('；');
                    if (recentShort) parts.push('【近期对话要点】' + recentShort);

                    // 波动记忆 - 计划
                    if (this.volatile.plans.length > 0) {
                        const planStr = this.volatile.plans
                            .map(p => `[${p.type}]${p.content}`)
                            .join('；');
                        parts.push('【活跃计划】' + planStr);
                    }

                    // 波动记忆 - 临时事件
                    const activeTemp = (this.volatile.temporaryEvents || [])
                        .filter(e => this._isTempEventActive(e))
                        .slice(-8)
                        .map(e => e.content)
                        .join('；');
                    if (activeTemp) parts.push('【当前临时事件】' + activeTemp);

                    return parts.length > 0 ? parts.join('\n') : '暂无存储记忆';
                }

                /** 清空所有记忆 */
                clearAll() {
                    this.shortTerm = { entries: [] };
                    this.longTerm = { expenses: [], preferences: [], basicInfo: { age: null, job: null,
                            pets: [], tools: [] }, aiLearning: [], facts: [] };
                    this.volatile = { plans: [], temporaryEvents: [] };
                    this._saveAll();
                }

                /** 导出记忆 */
                exportData(chatHistory = [], chatSummary = '') {
                    return {
                        shortTerm: this.shortTerm,
                        longTerm: this.longTerm,
                        volatile: this.volatile,
                        chatHistory: chatHistory,
                        chatSummary: chatSummary,
                        exportedAt: new Date().toISOString(),
                    };
                }

                /** 从 AI 回复文本中解析并应用 MEMORY_UPDATE 标记 */
                parseMemoryUpdate(content) {
                    if (!content) return;
                    const match = content.match(/<!--\s*MEMORY_UPDATE\s*:\s*([\s\S]*?)\s*-->/i);
                    if (!match) return;
                    try {
                        const memData = JSON.parse(match[1].trim());
                        debugLog('📌 检测到记忆更新标记');
                        this._applyMemoryData(memData);
                        window.dispatchEvent(new CustomEvent('aether-memory-updated'));
                    } catch (e) {
                        console.warn('⚠ 记忆更新 JSON 解析失败:', e, match[1].substring(0, 120));
                    }
                }

                _applyMemoryData(memData) {
                    if (!memData) return;

                    const asArray = value => Array.isArray(value) ? value : [value];
                    const textOf = item => {
                        if (typeof item === 'string') return item;
                        if (!item || typeof item !== 'object') return '';
                        return item.content || item.detail || item.description || item.text || item.value || '';
                    };
                    const categoryOf = (item, fallback = '通用') => {
                        if (!item || typeof item !== 'object') return fallback;
                        return item.category || item.type || item.topic || fallback;
                    };
                    const addBasicInfo = info => {
                        if (!info || typeof info !== 'object') return;
                        Object.keys(info).forEach(key => {
                            if (info[key] !== undefined && info[key] !== null) {
                                this.updateBasicInfo(key, info[key]);
                            }
                        });
                    };

                    if (memData.shortTerm) {
                        asArray(memData.shortTerm).forEach(item => {
                            const content = textOf(item);
                            if (content) this.addShortTerm(content, 'ai_extracted');
                        });
                    }
                    if (memData.expense) {
                        const exp = memData.expense;
                        this.addExpense(exp.amount, exp.category, exp.description || exp.content || exp.detail);
                    }
                    if (memData.expenses) asArray(memData.expenses).forEach(exp =>
                        this.addExpense(exp.amount, exp.category, exp.description || exp.content || exp.detail)
                    );
                    if (memData.preference) {
                        const pref = memData.preference;
                        this.addPreference(pref.category, pref.detail || pref.content || pref.description);
                    }
                    if (memData.preferences) asArray(memData.preferences).forEach(pref =>
                        this.addPreference(pref.category, pref.detail || pref.content || pref.description)
                    );
                    if (memData.basicInfo) {
                        addBasicInfo(memData.basicInfo);
                    }
                    if (memData.aiLearning) {
                        asArray(memData.aiLearning).forEach(learn =>
                            this.addAiLearning(learn.topic || learn.category, learn.content || learn.detail || learn.description)
                        );
                    }
                    if (memData.fact) {
                        asArray(memData.fact).forEach(item => {
                            const content = textOf(item);
                            if (content) this.addLongTermFact(categoryOf(item), content);
                        });
                    }
                    if (memData.facts) {
                        asArray(memData.facts).forEach(item => {
                            const content = textOf(item);
                            if (content) this.addLongTermFact(categoryOf(item), content);
                        });
                    }
                    if (memData.longTerm) {
                        const lt = memData.longTerm;
                        if (typeof lt === 'string') {
                            this.addLongTermFact('通用', lt);
                        } else if (Array.isArray(lt)) {
                            lt.forEach(item => {
                                const content = textOf(item);
                                if (content) this.addLongTermFact(categoryOf(item), content);
                            });
                        } else if (typeof lt === 'object') {
                            if (lt.basicInfo) {
                                addBasicInfo(lt.basicInfo);
                            }
                            if (lt.expense) this.addExpense(lt.expense.amount, lt.expense.category, lt.expense.description || lt.expense.content);
                            if (lt.expenses) asArray(lt.expenses).forEach(exp =>
                                this.addExpense(exp.amount, exp.category, exp.description || exp.content)
                            );
                            if (lt.preference) this.addPreference(lt.preference.category, lt.preference.detail || lt.preference.content);
                            if (lt.preferences) asArray(lt.preferences).forEach(pref =>
                                this.addPreference(pref.category, pref.detail || pref.content)
                            );
                            if (lt.aiLearning) asArray(lt.aiLearning).forEach(learn =>
                                this.addAiLearning(learn.topic || learn.category, learn.content || learn.detail)
                            );
                            if (lt.fact) asArray(lt.fact).forEach(item => {
                                const content = textOf(item);
                                if (content) this.addLongTermFact(categoryOf(item), content);
                            });
                            if (lt.facts) asArray(lt.facts).forEach(item => {
                                const content = textOf(item);
                                if (content) this.addLongTermFact(categoryOf(item), content);
                            });
                            const looseContent = textOf(lt);
                            if (looseContent) this.addLongTermFact(categoryOf(lt), looseContent);
                        }
                    }
                    const planItems = [];
                    if (memData.plan) planItems.push(memData.plan);
                    if (memData.plans) {
                        const extra = Array.isArray(memData.plans) ? memData.plans : [memData.plans];
                        planItems.push(...extra);
                    }
                    if (memData.volatile && memData.volatile.plan) {
                        const extra = Array.isArray(memData.volatile.plan) ? memData.volatile.plan : [memData.volatile.plan];
                        planItems.push(...extra);
                    }
                    if (memData.volatile && memData.volatile.plans) {
                        const extra = Array.isArray(memData.volatile.plans) ? memData.volatile.plans : [memData.volatile.plans];
                        planItems.push(...extra);
                    }
                    planItems.forEach(plan => {
                        debugLog('🔄 收到计划更新:', plan);
                        const content = plan.content || plan.detail || plan.description;
                        if (!content) {
                            console.warn('⚠ 计划缺少 content:', plan);
                            return;
                        }
                        const type = plan.type || plan.category || '其他';
                        this.addPlan(type, content);
                    });

                    const tempEventItems = [];
                    if (memData.temporaryEvent) tempEventItems.push(memData.temporaryEvent);
                    if (memData.tempEvent) tempEventItems.push(memData.tempEvent);
                    if (memData.event) tempEventItems.push(memData.event);
                    if (memData.temporaryEvents) {
                        const extra = Array.isArray(memData.temporaryEvents) ? memData.temporaryEvents : [memData.temporaryEvents];
                        tempEventItems.push(...extra);
                    }
                    if (memData.volatile && memData.volatile.temporaryEvent) {
                        const extra = Array.isArray(memData.volatile.temporaryEvent) ?
                            memData.volatile.temporaryEvent : [memData.volatile.temporaryEvent];
                        tempEventItems.push(...extra);
                    }
                    if (memData.volatile && memData.volatile.tempEvent) {
                        const extra = Array.isArray(memData.volatile.tempEvent) ?
                            memData.volatile.tempEvent : [memData.volatile.tempEvent];
                        tempEventItems.push(...extra);
                    }
                    if (memData.volatile && memData.volatile.event) {
                        const extra = Array.isArray(memData.volatile.event) ? memData.volatile.event : [memData.volatile.event];
                        tempEventItems.push(...extra);
                    }
                    if (memData.volatile && memData.volatile.temporaryEvents) {
                        const extra = Array.isArray(memData.volatile.temporaryEvents) ?
                            memData.volatile.temporaryEvents : [memData.volatile.temporaryEvents];
                        tempEventItems.push(...extra);
                    }
                    if (memData.volatile && typeof memData.volatile === 'string') {
                        tempEventItems.push({ content: memData.volatile });
                    } else if (memData.volatile && !planItems.length && !tempEventItems.length) {
                        const content = textOf(memData.volatile);
                        if (content) tempEventItems.push(memData.volatile);
                    }
                    tempEventItems.forEach(te => {
                        debugLog('🔄 收到临时事件更新:', te);
                        const content = te.content || te.detail || te.description;
                        if (!content) {
                            console.warn('⚠ 临时事件缺少 content:', te);
                            return;
                        }
                        this.addTemporaryEvent(content, te.estimatedExpiry ?? te.expiry ?? null);
                    });
                    if (memData.removeShortTerm) {
                        asArray(memData.removeShortTerm).forEach(item => this.removeShortTerm(item));
                    }
                    if (memData.removeBasicInfo) {
                        this.removeBasicInfo(memData.removeBasicInfo);
                    }
                    if (memData.removePreference) {
                        asArray(memData.removePreference).forEach(item =>
                            this.removeLongTermMemory({ ...((typeof item === 'object' && item) || { content: item }), scope: 'preference' })
                        );
                    }
                    if (memData.removeFact) {
                        asArray(memData.removeFact).forEach(item =>
                            this.removeLongTermMemory({ ...((typeof item === 'object' && item) || { content: item }), scope: 'fact' })
                        );
                    }
                    if (memData.removeAiLearning) {
                        asArray(memData.removeAiLearning).forEach(item =>
                            this.removeLongTermMemory({ ...((typeof item === 'object' && item) || { content: item }), scope: 'aiLearning' })
                        );
                    }
                    if (memData.removeExpense) {
                        asArray(memData.removeExpense).forEach(item =>
                            this.removeLongTermMemory({ ...((typeof item === 'object' && item) || { content: item }), scope: 'expense' })
                        );
                    }
                    if (memData.removeLongTerm) {
                        this.removeLongTermMemory(memData.removeLongTerm);
                    }
                    if (memData.removeVolatile) {
                        this.removeVolatileMemory(memData.removeVolatile);
                    }
                    if (memData.removePlan) {
                        asArray(memData.removePlan).forEach(item => this.removePlan(item));
                    }
                    if (memData.removeTemporaryEvent) {
                        asArray(memData.removeTemporaryEvent).forEach(item => this.removeTemporaryEvent(item));
                    }
                    if (memData.removeMemory) {
                        this.removeMemory(memData.removeMemory);
                    }
                    if (memData.userNegation) {
                        this.handleUserNegation(memData.userNegation);
                    }
                }
            }

            // 初始化记忆系统
            window.memorySystem = new MemorySystem();
            const memorySystem = window.memorySystem;

            // ==================== 设置管理 ====================
            function loadSettings() {
                const defaults = {
                    apiKey: '',
                    apiBase: 'https://api.deepseek.com/v1',
                    model: 'deepseek-chat',
                    proxy: '',
                    autoSave: false,
                    autoSaveInterval: 10,
                    rememberApiKey: false,
                    debugCodeSearch: true,
                };
                try {
                    const raw = localStorage.getItem(STORAGE_KEYS.SETTINGS);
                    if (raw) {
                        const stored = { ...defaults, ...JSON.parse(raw) };
                        const sessionKey = sessionStorage.getItem(STORAGE_KEYS.SESSION_API_KEY) || '';
                        const savedKey = stored.apiKey || '';
                        const legacySavedKey = !!savedKey && stored.rememberApiKey === undefined;
                        stored.rememberApiKey = stored.rememberApiKey === true || legacySavedKey;
                        stored.apiKey = stored.rememberApiKey ? savedKey : sessionKey;
                        return stored;
                    }
                } catch (e) { /* ignore */ }
                return defaults;
            }

            function persistSettings(settings) {
                const safeSettings = { ...settings };
                if (safeSettings.rememberApiKey) {
                    sessionStorage.removeItem(STORAGE_KEYS.SESSION_API_KEY);
                } else {
                    if (safeSettings.apiKey) {
                        sessionStorage.setItem(STORAGE_KEYS.SESSION_API_KEY, safeSettings.apiKey);
                    } else {
                        sessionStorage.removeItem(STORAGE_KEYS.SESSION_API_KEY);
                    }
                    safeSettings.apiKey = '';
                }
                localStorage.setItem(STORAGE_KEYS.SETTINGS, JSON.stringify(safeSettings));
            }

            let appSettings = loadSettings();

            function populateSettingsForm() {
                apiKeyInput.value = appSettings.apiKey || '';
                persistApiKeyToggle.checked = appSettings.rememberApiKey === true;
                apiBaseInput.value = appSettings.apiBase || 'https://api.deepseek.com/v1';
                modelSelect.value = appSettings.model || 'deepseek-chat';
                proxyInput.value = appSettings.proxy || '';
                autoSaveToggle.checked = appSettings.autoSave || false;
                autoSaveInterval.value = appSettings.autoSaveInterval || 10;
                debugCodeToggle.checked = appSettings.debugCodeSearch !== false;
            }

            // ==================== Toast ====================
            function showToast(msg, duration = 2800) {
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = msg;
                toastContainer.appendChild(toast);
                setTimeout(() => {
                    if (toast.parentNode) toast.parentNode.removeChild(toast);
                }, duration + 400);
            }

            function warnAboutUnsafeOrigin() {
                if (window.location.protocol === 'file:') {
                    const message = [
                        '当前是 file:// 打开方式，浏览器会把本地文件当成独立安全来源。',
                        '这会导致记忆存储、API 请求和调试控制台行为不稳定。',
                        '请用本地服务打开：http://localhost:8765/aether.html'
                    ].join('\n');
                    showToast('请用 http://localhost:8765/aether.html 打开，避免 file:// 存储异常', 7000);
                    renderMessage('ai', message);
                    return;
                }

                if (window.location.hostname === '127.0.0.1') {
                    showToast('建议固定使用 localhost:8765；127.0.0.1 和 localhost 的记忆存储不互通', 6000);
                }
            }

            // ==================== AI头像动画 ====================
            function setThinkingState(thinking) {
                if (thinking) {
                    aiAvatarWrapper.classList.add('thinking');
                    aiStatus.textContent = '思考中...';
                    aiStatus.className = 'ai-status processing';
                } else {
                    aiAvatarWrapper.classList.remove('thinking');
                    aiStatus.textContent = '就绪';
                    aiStatus.className = 'ai-status ready';
                }
            }

            // ==================== 渲染消息 ====================
            function renderMessage(role, content, timestamp = null, options = {}) {
                const { applyMemoryUpdate = false } = options;
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${role}`;
                const avatarText = role === 'user' ? 'U' : 'AI';
                const timeStr = timestamp ? new Date(timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit',
                    minute: '2-digit' }) : new Date().toLocaleTimeString('zh-CN', { hour: '2-digit',
                    minute: '2-digit' });

                // 始终剥离记忆标记，避免在聊天气泡中显示
                let displayContent = stripMemoryUpdateMarkers(content);
                if (role === 'ai') {
                    displayContent = stripVisibleTimestampPrefixes(displayContent);
                }
                if (applyMemoryUpdate) {
                    memorySystem.parseMemoryUpdate(content);
                }

                // 简单的Markdown处理
                const formattedContent = formatMessageContent(displayContent);

                msgDiv.innerHTML = `
                    <div class="msg-avatar">${avatarText}</div>
                    <div>
                        <div class="msg-bubble">${formattedContent}</div>
                        <div class="msg-time">${timeStr}</div>
                    </div>
                `;
                messagesContainer.appendChild(msgDiv);
                scrollToBottom();
                return msgDiv;
            }

            function stripVisibleTimestampPrefixes(text) {
                if (!text) return '';
                let cleaned = String(text).trim();
                const timestampPrefixes = [
                    /^\s*\[[^\]\n]{0,30}(?:\d{1,4}[\/\-年.]\d{1,2}(?:[\/\-月.]\d{1,2}日?)?|\d{1,2}:\d{2})(?:[^\]\n]{0,20})\]\s*/,
                    /^\s*(?:\d{4}[\/\-年.])?\d{1,2}[\/\-月.]\d{1,2}日?\s+\d{1,2}:\d{2}(?::\d{2})?\s*[:：\-—–]\s*/,
                    /^\s*\d{1,2}:\d{2}(?::\d{2})?\s*[:：\-—–]\s*/
                ];
                for (let i = 0; i < 5; i++) {
                    const before = cleaned;
                    for (const prefix of timestampPrefixes) {
                        cleaned = cleaned.replace(prefix, '').trimStart();
                    }
                    if (cleaned === before) break;
                }
                return cleaned;
            }

            function formatMessageContent(text) {
                if (!text) return '';
                // 转义HTML
                let escaped = text
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');
                // 代码块
                escaped = escaped.replace(/```(\w*)\n?([\s\S]*?)```/g,
                    '<pre><code>$2</code></pre>');
                // 行内代码
                escaped = escaped.replace(/`([^`]+)`/g, '<code>$1</code>');
                // 粗体
                escaped = escaped.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                // 段落
                escaped = escaped.replace(/\n\n/g, '</p><p>');
                escaped = escaped.replace(/\n/g, '<br>');
                if (!escaped.startsWith('<p>') && !escaped.startsWith('<pre>')) {
                    escaped = '<p>' + escaped + '</p>';
                }
                return escaped;
            }

            function scrollToBottom() {
                requestAnimationFrame(() => {
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                });
            }

            // ==================== 解析记忆更新标记 ====================
            function extractMemoryUpdatePayload(content) {
                if (!content) return null;
                const match = content.match(/<!--\s*MEMORY_UPDATE\s*:\s*([\s\S]*?)\s*-->/i);
                if (!match) return null;
                try {
                    return JSON.parse(match[1].trim());
                } catch (e) {
                    console.warn('⚠ 记忆更新 JSON 解析失败:', e, match[1].substring(0, 120));
                    return null;
                }
            }

            function stripMemoryUpdateMarkers(content) {
                if (!content) return '';
                return content.replace(/<!--\s*MEMORY_UPDATE\s*:[\s\S]*?\s*-->/gi, '').trim();
            }

            function messageSnippetForSummary(msg) {
                const role = msg.role === 'assistant' ? 'AI' : '用户';
                const content = stripVisibleTimestampPrefixes(stripMemoryUpdateMarkers(msg.content || ''))
                    .replace(/\s+/g, ' ')
                    .trim()
                    .slice(0, 160);
                if (!content) return '';
                const time = msg.timestamp ? new Date(msg.timestamp).toLocaleString('zh-CN', {
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                }) : '';
                return `${time ? '[' + time + '] ' : ''}${role}: ${content}`;
            }

            function compactConversationHistory() {
                if (conversationHistory.length <= MAX_STORED_CHAT_MESSAGES) return;
                const overflowCount = conversationHistory.length - MAX_STORED_CHAT_MESSAGES;
                const archived = conversationHistory.slice(0, overflowCount)
                    .map(messageSnippetForSummary)
                    .filter(Boolean);
                const existing = conversationSummary
                    ? conversationSummary.split('\n').map(s => s.trim()).filter(Boolean)
                    : [];
                conversationSummary = existing.concat(archived).slice(-MAX_SUMMARY_ITEMS).join('\n');
                conversationHistory = conversationHistory.slice(overflowCount);
            }

            function buildApiConversationMessages() {
                compactConversationHistory();
                const recentMessages = conversationHistory.slice(-MAX_API_HISTORY_MESSAGES).map(msg => {
                    const timeStr = msg.timestamp
                        ? new Date(msg.timestamp).toLocaleString('zh-CN', {
                            month: '2-digit',
                            day: '2-digit',
                            hour: '2-digit',
                            minute: '2-digit'
                        })
                        : '';
                    return {
                        role: msg.role,
                        content: timeStr ? `[${timeStr}] ${msg.content}` : msg.content
                    };
                });

                if (!conversationSummary) return recentMessages;
                return [
                    {
                        role: 'system',
                        content: '以下是更早对话的本地摘要，仅用于连续性参考：\n' + conversationSummary
                    },
                    ...recentMessages,
                ];
            }

            // ==================== 处理记忆更新指令 ====================
            function processMemoryUpdate(memData) {
                memorySystem._applyMemoryData(memData);
            }

            function countAllMemoryEntries() {
                return (memorySystem.shortTerm.entries || []).length +
                    countLongTermEntries() +
                    countVolatileEntries();
            }

            function memorySelectionKey(target) {
                if (!target) return '';
                try {
                    return JSON.stringify(target);
                } catch (error) {
                    return '';
                }
            }

            function createMemorySelection(label, target) {
                const key = memorySelectionKey(target);
                return {
                    key,
                    label: String(label || ''),
                    target,
                    selectedAt: Date.now(),
                };
            }

            function setSelectedMemory(selection) {
                selectedMemory = selection || null;
                window.selectedMemory = selectedMemory;

                $$('.mem-item[data-memory-key]').forEach(item => {
                    const itemKey = decodeURIComponent(item.dataset.memoryKey || '');
                    const isSelected = !!selectedMemory && itemKey === selectedMemory.key;
                    item.classList.toggle('selected', isSelected);
                    item.setAttribute('aria-pressed', isSelected ? 'true' : 'false');
                });

                if (selectedMemory) {
                    showToast('已选中记忆：' + selectedMemory.label.substring(0, 48));
                }
            }

            function clearSelectedMemory() {
                setSelectedMemory(null);
            }

            function getSelectedMemoryDeleteTarget(userText) {
                if (!selectedMemory || !selectedMemory.target) return null;
                const target = { ...selectedMemory.target };
                const inferredScope = inferDeleteScope(userText || '');
                if (inferredScope !== 'all') target.scope = inferredScope;
                return target;
            }

            function selectedMemoryContextText() {
                if (!selectedMemory) return '当前没有选中的记忆。';
                return [
                    '当前选中的记忆：',
                    '- 显示文本：' + selectedMemory.label,
                    '- 删除目标：' + JSON.stringify(selectedMemory.target),
                ].join('\n');
            }

            function memoryItemHTML(label, meta, target) {
                const selection = createMemorySelection(label, target);
                const selectedClass = selectedMemory && selectedMemory.key === selection.key ? ' selected' : '';
                const metaHTML = meta ? `<div class="mem-meta">${escapeHTML(meta)}</div>` : '';
                return `<div class="mem-item${selectedClass}" role="button" tabindex="0" aria-pressed="${selectedClass ? 'true' : 'false'}" data-memory-key="${encodeURIComponent(selection.key)}" data-memory-label="${encodeURIComponent(selection.label)}" data-memory-target="${encodeURIComponent(JSON.stringify(target))}">${escapeHTML(label)}${metaHTML}</div>`;
            }

            function inferDeleteScope(text) {
                if (/短期/.test(text)) return 'shortTerm';
                if (/长期|喜好|事实|学习|开销|基本信息/.test(text)) return 'longTerm';
                if (/波动|计划|临时|事件/.test(text)) return 'volatile';
                return 'all';
            }

            function extractDeleteTargetFromUserText(text) {
                const quoted = text.match(/[“"「『']([^”"」』']{2,})[”"」』']/);
                if (quoted) return quoted[1].trim();

                const keywordPattern = /(删除|删掉|移除|清除|清理|忘掉|取消|别记|不要记|不用记|去掉)/g;
                let match;
                let lastIndex = -1;
                while ((match = keywordPattern.exec(text)) !== null) {
                    lastIndex = match.index + match[0].length;
                }
                if (lastIndex < 0) return '';

                return text.slice(lastIndex)
                    .replace(/^[\s,，。.!！:：；;、]*(短期|长期|波动)?记忆?/u, '')
                    .replace(/^[\s,，。.!！:：；;、]*(计划|临时事件|事件|喜好|事实|开销|基本信息)?/u, '')
                    .replace(/^(里|中|列表里|列表中|里面|这个|这条|那个|那条|关于|内容|项目|事项)+/u, '')
                    .replace(/(这条|这个|那条|那个)?(记忆|计划|事件|内容|项目|事项)$/u, '')
                    .trim();
            }

            function applyLocalDeleteIntent(userText) {
                if (!/(删除|删掉|移除|清除|清理|忘掉|取消|别记|不要记|不用记|去掉)/.test(userText)) {
                    return { handled: false, deleted: false, reason: 'no-delete-intent' };
                }
                const target = extractDeleteTargetFromUserText(userText);
                if (!target || target.length < 2) {
                    const selectedTarget = getSelectedMemoryDeleteTarget(userText);
                    if (!selectedTarget) {
                        const message = '我还没有感知到你选中了哪条记忆。请先在左侧记忆面板点选一条。';
                        showToast(message);
                        return { handled: true, deleted: false, reason: 'missing-selected-memory', message };
                    }

                    const before = countAllMemoryEntries();
                    const selectedLabel = selectedMemory.label;
                    memorySystem.removeMemory(selectedTarget);
                    const after = countAllMemoryEntries();
                    updateMemoryPanel();

                    if (after < before) {
                        clearSelectedMemory();
                        const message = '已删除你选中的记忆：' + selectedLabel;
                        showToast(message);
                        return { handled: true, deleted: true, target: selectedLabel, before, after, message };
                    }
                    const message = '我感知到了选中的记忆，但没有找到可删除的匹配项：' + selectedLabel;
                    showToast(message);
                    return { handled: true, deleted: false, target: selectedLabel, before, after, message };
                }

                const before = countAllMemoryEntries();
                memorySystem.removeMemory({
                    scope: inferDeleteScope(userText),
                    content: target,
                });
                const after = countAllMemoryEntries();
                updateMemoryPanel();

                if (after < before) {
                    clearSelectedMemory();
                    showToast('已从记忆中删除：' + target);
                    return { handled: true, deleted: true, target, before, after, message: '已从记忆中删除：' + target };
                }
                showToast('没有找到可删除的记忆：' + target);
                return { handled: true, deleted: false, target, before, after, message: '没有找到可删除的记忆：' + target };
            }

            function extractSaveTargetFromUserText(text) {
                const quoted = text.match(/[“"「『']([^”"」』']{2,})[”"」』']/);
                if (quoted) return quoted[1].trim();

                const colonMatch = text.match(/(?:存入|记录|记住|保存|备忘|新增|添加|todo|待办|计划)\s*[:：]\s*([\s\S]{2,})/i);
                if (colonMatch) return colonMatch[1].trim();

                const keywordPattern = /(存入|记录|记住|保存|备忘|新增|添加|加入|写入|todo|待办|计划)/gi;
                let match;
                let lastIndex = -1;
                while ((match = keywordPattern.exec(text)) !== null) {
                    lastIndex = match.index + match[0].length;
                }
                if (lastIndex < 0) return '';

                return text.slice(lastIndex)
                    .replace(/^[\s,，。.!！:：；;、]*(到|进|入|一下|一个|一条)?/u, '')
                    .replace(/^[\s,，。.!！:：；;、]*(短期|长期|波动)?记忆?/u, '')
                    .replace(/^[\s,，。.!！:：；;、]*(计划|临时事件|事件|喜好|事实|待办|todo)?/iu, '')
                    .replace(/^(里|中|列表里|列表中|里面|这个|这条|关于|内容|项目|事项)+/u, '')
                    .trim();
            }

            function inferSaveMemoryType(text, target) {
                if (/短期/.test(text)) return 'shortTerm';
                if (/长期|长期事实|事实|喜好|偏好|基本信息/.test(text)) return 'longTerm';
                if (/波动|临时|事件|待办|todo|计划|今天|明天|后天|会议|截止|提醒/.test(text + ' ' + target)) {
                    return /计划|待办|todo/.test(text) ? 'plan' : 'temporaryEvent';
                }
                return 'temporaryEvent';
            }

            function futureExpiry(days) {
                return Date.now() + days * 24 * 60 * 60 * 1000;
            }

            function applyLocalSaveIntent(userText) {
                if (!/(存入|记录|记住|保存|备忘|新增|添加|加入|写入|todo|待办|计划)/i.test(userText)) {
                    return { handled: false, saved: false, reason: 'no-save-intent' };
                }
                if (/(删除|删掉|移除|清除|清理|忘掉|取消|别记|不要记|不用记|去掉)/.test(userText)) {
                    return { handled: false, saved: false, reason: 'delete-intent' };
                }

                const target = extractSaveTargetFromUserText(userText);
                if (!target || target.length < 2) {
                    return { handled: false, saved: false, reason: 'missing-target' };
                }

                const type = inferSaveMemoryType(userText, target);
                if (type === 'shortTerm') {
                    memorySystem.addShortTerm(target, 'local_intent');
                } else if (type === 'longTerm') {
                    if (/喜好|偏好/.test(userText)) {
                        memorySystem.addPreference('通用', target);
                    } else {
                        memorySystem.addLongTermFact('用户记录', target);
                    }
                } else if (type === 'plan') {
                    memorySystem.addPlan(/todo|待办/i.test(userText) ? '待办' : '其他', target);
                } else {
                    memorySystem.addTemporaryEvent(target, futureExpiry(3));
                }

                updateMemoryPanel();
                showToast('已存入记忆：' + target);
                return { handled: true, saved: true, target, type };
            }

            // ==================== 本地代码检索 ====================
            const DEBUG_FALLBACK_QUERIES = [
                'debugCodeSearch',
                'buildCodeDebugContext',
                '/api/debug/search',
                'search_project_code',
                'read_project_code',
                'safe_project_path',
            ];

            function looksLikeCodeDebugRequest(text) {
                return /代码|源码|函数|方法|类|接口|文件|实现|定义|调用|读取|访问|权限|报错|错误|bug|debug|调试|检索|搜索|查找|查看|查到|定位|修复|功能|read code|search code|where is/i.test(text);
            }

            function uniqueList(items) {
                return Array.from(new Set(items.map(item => item.trim()).filter(Boolean)));
            }

            function buildDebugSearchQueries(text) {
                const quoted = [];
                const quoteRe = /["'“”‘’`]{1}([^"'“”‘’`]{2,80})["'“”‘’`]{1}/g;
                let quoteMatch;
                while ((quoteMatch = quoteRe.exec(text))) quoted.push(quoteMatch[1]);

                const identifiers = (text.match(/[A-Za-z_$][\w$.-]{2,}/g) || [])
                    .filter(token => !/^(debug|bug|code|read|search|where|function|class|file|api)$/i.test(token))
                    .sort((a, b) => b.length - a.length);

                const cleaned = text
                    .replace(/[，。！？、,.!?;；:：()[\]{}]/g, ' ')
                    .replace(/帮我|请|一下|这个|那个|本地|项目|代码|源码|函数|方法|类|接口|文件|实现|定义|调用|报错|错误|调试|检索|搜索|查找|查看|定位|修复|在哪|哪里|怎么|为什么|问题|相关|逻辑/g, ' ')
                    .replace(/\s+/g, ' ')
                    .trim();

                const queries = uniqueList([
                    ...quoted,
                    ...identifiers.slice(0, 4),
                    cleaned,
                    text.trim(),
                ]).filter(query => query.length >= 2 && query.length <= 80);

                return queries.slice(0, 5);
            }

            async function fetchDebugJson(url) {
                const response = await fetch(url);
                if (!response.ok) {
                    const payload = await response.json().catch(() => ({}));
                    throw new Error(payload.error || `本地检索失败 (${response.status})`);
                }
                return response.json();
            }

            async function buildCodeDebugContext(userText, settings) {
                if (settings.debugCodeSearch === false || !looksLikeCodeDebugRequest(userText)) return '';

                const queries = uniqueList([
                    ...buildDebugSearchQueries(userText),
                    ...DEBUG_FALLBACK_QUERIES,
                ]);

                let searchPayload = null;
                let usedQuery = '';
                const attemptedQueries = [];
                for (const query of queries) {
                    attemptedQueries.push(query);
                    const url = `/api/debug/search?q=${encodeURIComponent(query)}&limit=6`;
                    const payload = await fetchDebugJson(url);
                    if (payload.results && payload.results.length) {
                        searchPayload = payload;
                        usedQuery = query;
                        break;
                    }
                }

                if (!searchPayload) {
                    return [
                        "## 本地代码检索上下文",
                        "用户问题触发了本地代码检索，但没有找到匹配结果。",
                        `已尝试搜索：${attemptedQueries.join('、')}`,
                        "你已经具备读取助手所在文件夹内代码片段的能力；不要回答“没有文件系统权限”。如果结果为空，请让用户提供更具体的函数名、文件名或错误关键词。",
                    ].join("\n");
                }

                const snippets = [];
                const seen = new Set();
                for (const result of searchPayload.results.slice(0, 3)) {
                    const key = `${result.file}:${result.line}`;
                    if (seen.has(key)) continue;
                    seen.add(key);

                    const readUrl = `/api/debug/read?file=${encodeURIComponent(result.file)}&line=${result.line}&context=140`;
                    const detail = await fetchDebugJson(readUrl);
                    snippets.push(`### ${detail.file}:${detail.startLine}-${detail.endLine}\n\`\`\`\n${detail.code}\n\`\`\``);
                }

                if (!snippets.length) return '';

                return [
                    "## 本地代码检索上下文",
                    `用户问题触发了本地代码检索。搜索词：${usedQuery}`,
                    "以下代码片段只来自助手所在文件夹。回答时优先基于这些片段；如果片段不足，请明确说明还需要搜索什么。",
                    "你已经具备读取助手所在文件夹内代码片段的能力；不要回答“没有文件系统权限”。",
                    "",
                    snippets.join("\n\n"),
                ].join("\n");
            }

            // ==================== 记忆面板调试上下文 ====================
            function looksLikeMemoryPanelRequest(text) {
                return /记忆|记住|记得|存入|保存|短期|长期|波动|计划|待办|临时|偏好|喜好|事实|面板|左侧|侧边栏|显示|没显示|看不到|空了|数量|memory/i.test(text);
            }

            function truncateForContext(value, maxLength = 1200) {
                const text = String(value || '').trim();
                if (text.length <= maxLength) return text;
                return text.slice(0, maxLength) + `\n...（已截断，原长度 ${text.length} 字符）`;
            }

            function countDefinedBasicInfo(basicInfo) {
                if (!basicInfo || typeof basicInfo !== 'object') return 0;
                return Object.values(basicInfo).filter(value => {
                    if (Array.isArray(value)) return value.length > 0;
                    if (value && typeof value === 'object') return Object.keys(value).length > 0;
                    return value !== undefined && value !== null && String(value).trim() !== '';
                }).length;
            }

            function buildMemoryPanelSnapshot() {
                const shortEntries = memorySystem.shortTerm.entries || [];
                const longTerm = memorySystem.longTerm || {};
                const volatile = memorySystem.volatile || {};
                const plans = volatile.plans || [];
                const temporaryEvents = volatile.temporaryEvents || [];
                const activeTemporaryEvents = temporaryEvents.filter(e =>
                    e && e.content && memorySystem._isTempEventActive(e)
                );

                return {
                    sidebar: {
                        isOpen: appContainer.classList.contains('sidebar-open'),
                        text: truncateForContext(sidebarContent ? sidebarContent.innerText : '', 1800),
                        hasEmptyShortHint: !!$('#memShort .empty-hint'),
                        hasEmptyLongHint: !!$('#memLong .empty-hint'),
                        hasEmptyVolatileHint: !!$('#memVolatile .empty-hint'),
                    },
                    selection: selectedMemory,
                    counts: {
                        shortTermVisible: shortEntries.filter(e =>
                            e && e.content && (!e.expiresAt || e.expiresAt > Date.now())
                        ).length,
                        shortTermStored: shortEntries.length,
                        basicInfoFields: countDefinedBasicInfo(longTerm.basicInfo),
                        preferences: (longTerm.preferences || []).length,
                        aiLearning: (longTerm.aiLearning || []).length,
                        expenses: (longTerm.expenses || []).length,
                        facts: (longTerm.facts || []).length,
                        plans: plans.filter(p => p && p.content).length,
                        temporaryEvents: activeTemporaryEvents.length,
                    },
                    dataPreview: {
                        shortTerm: shortEntries.slice(0, 8),
                        longTerm: {
                            basicInfo: longTerm.basicInfo || {},
                            preferences: (longTerm.preferences || []).slice(0, 8),
                            aiLearning: (longTerm.aiLearning || []).slice(0, 8),
                            expenses: (longTerm.expenses || []).slice(0, 8),
                            facts: (longTerm.facts || []).slice(0, 8),
                        },
                        volatile: {
                            plans: plans.slice(0, 8),
                            temporaryEvents: activeTemporaryEvents.slice(0, 8),
                        },
                    },
                };
            }

            function buildMemoryPanelDebugContext(userText) {
