<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 助手 - 记忆聊天</title>
    <style>
        :root {
            --bg: #fafaf5;
            --ivory: #fefef9;
            --white: #ffffff;
            --card: #f8f6f0;
            --border: #e8e4db;
            --text: #2c2c28;
            --text-secondary: #6b6b62;
            --text-muted: #9a9a8f;
            --accent: #3a3a34;
            --accent-soft: #5c5c52;
            --user-msg-bg: #f3f1ea;
            --ai-msg-bg: #fefefb;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.08);
            --radius-sm: 8px;
            --radius: 14px;
            --radius-lg: 20px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font-sans: 'Inter', 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', system-ui,
                -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Consolas', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            font-size: 15px;
            scroll-behavior: smooth;
        }
        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ========== 主容器 ========== */
        .app-container {
            display: flex;
            width: 100%;
            max-width: 1100px;
            height: 100vh;
            max-height: 900px;
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            position: relative;
            margin: 0 8px;
        }
        @media (max-width: 768px) {
            .app-container {
                max-height: 100vh;
                border-radius: 0;
                margin: 0;
                flex-direction: column;
            }
        }

        /* ========== 侧边栏 - 记忆面板 ========== */
        .sidebar {
            width: 340px;
            min-width: 340px;
            background: var(--ivory);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform var(--transition), min-width var(--transition);
            z-index: 10;
        }
        .sidebar.collapsed {
            min-width: 0;
            width: 0;
            transform: translateX(-100%);
            border-right: none;
        }
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                top: 0;
                left: 0;
                height: 100%;
                width: 300px;
                min-width: 300px;
                z-index: 30;
                border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
                box-shadow: var(--shadow-lg);
            }
            .sidebar.collapsed {
                transform: translateX(-105%);
            }
        }
        .sidebar-header {
            padding: 20px 20px 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
            flex-shrink: 0;
        }
        .sidebar-header-text {
            flex: 1;
            min-width: 0;
        }
        .sidebar-header h3 {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.02em;
        }
        .sidebar-stats {
            margin-top: 4px;
            font-size: 0.72rem;
            color: var(--text-muted);
        }
        .sidebar-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--white);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: var(--text-secondary);
            transition: all var(--transition);
        }
        .sidebar-close:hover {
            background: #f0ede5;
            color: var(--accent);
        }
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .sidebar-content::-webkit-scrollbar {
            width: 3px;
        }
        .sidebar-content::-webkit-scrollbar-thumb {
            background: #d5d0c7;
            border-radius: 10px;
        }
        .memory-section {
            background: var(--white);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            border: 1px solid var(--border);
            transition: all var(--transition);
        }
        .memory-section h4 {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--accent-soft);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.03em;
        }
        .memory-section h4 .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }
        .dot-short {
            background: #c9b99a;
        }
        .dot-long {
            background: #5c5c52;
        }
        .dot-volatile {
            background: #d4a76a;
        }
        .memory-section .mem-item {
            font-size: 0.75rem;
            color: var(--text-secondary);
            padding: 6px 8px;
            border-bottom: 1px dotted #ece8df;
            line-height: 1.4;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
            outline: none;
            position: relative;
        }
        .memory-section .mem-item:last-child {
            border-bottom: none;
        }
        .memory-section .mem-item:hover,
        .memory-section .mem-item:focus-visible {
            background: #f7f2e8;
            color: var(--text-primary);
        }
        .memory-section .mem-item.selected {
            background: #fff7e7;
            color: var(--text-primary);
            box-shadow: inset 0 0 0 1px #d4a76a;
        }
        .memory-section .mem-item.selected::before {
            content: "✓";
            position: absolute;
            top: 6px;
            right: 8px;
            color: #9a6b28;
            font-size: 0.72rem;
            font-weight: 700;
        }
        .memory-section .mem-item.selected .mem-meta {
            padding-right: 14px;
        }
        .memory-section .mem-meta {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .memory-section .empty-hint {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-style: italic;
        }
        .sidebar-footer {
            padding: 10px 16px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .sidebar-footer button {
            font-size: 0.7rem;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--white);
            cursor: pointer;
            color: var(--text-secondary);
            transition: all var(--transition);
            white-space: nowrap;
        }
        .sidebar-footer button:hover {
            background: #f5f2eb;
            color: var(--accent);
            border-color: #ccc5b8;
        }
        .sidebar-footer button.danger {
            color: #c47a6a;
            border-color: #e8d5cf;
        }
        .sidebar-footer button.danger:hover {
            background: #fdf5f2;
            border-color: #c47a6a;
            color: #b05a4a;
        }

        /* ========== 主聊天区 ========== */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: var(--white);
            position: relative;
        }

        /* 顶栏 */
        .top-bar {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            background: var(--ivory);
        }
        .menu-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--white);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: var(--text-secondary);
            transition: all var(--transition);
            flex-shrink: 0;
        }
        .menu-btn:hover {
            background: #f0ede5;
            color: var(--accent);
        }
        .top-bar .ai-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }
        /* AI头像容器 - 几何分散聚合动画 */
        .ai-avatar-wrapper {
            position: relative;
            width: 42px;
            height: 42px;
            flex-shrink: 0;
            cursor: pointer;
        }
        .ai-avatar-core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 26px;
            height: 26px;
            background: var(--accent);
            border-radius: 6px;
            z-index: 2;
            transition: all var(--transition);
            /* 几何菱形效果 */
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
        }
        .ai-avatar-fragments {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .fragment {
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--accent-soft);
            border-radius: 2px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.08s ease;
            opacity: 0.7;
        }
        .fragment.f1 {
            border-radius: 50%;
            background: #6b6b5e;
        }
        .fragment.f2 {
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
            border-radius: 0;
            background: #55554b;
        }
        .fragment.f3 {
            border-radius: 50%;
            background: #78786a;
        }
        .fragment.f4 {
            border-radius: 1px;
            background: #4a4a40;
        }
        .fragment.f5 {
            border-radius: 50%;
            background: #6e6e60;
        }
        .fragment.f6 {
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%);
            border-radius: 0;
            background: #5a5a4f;
        }
        /* 思考动画 - 分散聚合 */
        .ai-avatar-wrapper.thinking .fragment {
            animation: disperseGather 1.4s ease-in-out infinite;
        }
        .ai-avatar-wrapper.thinking .fragment.f1 {
            animation-delay: 0s;
        }
        .ai-avatar-wrapper.thinking .fragment.f2 {
            animation-delay: 0.12s;
        }
        .ai-avatar-wrapper.thinking .fragment.f3 {
            animation-delay: 0.24s;
        }
        .ai-avatar-wrapper.thinking .fragment.f4 {
            animation-delay: 0.36s;
        }
        .ai-avatar-wrapper.thinking .fragment.f5 {
            animation-delay: 0.48s;
        }
        .ai-avatar-wrapper.thinking .fragment.f6 {
            animation-delay: 0.6s;
        }
        .ai-avatar-wrapper.thinking .ai-avatar-core {
            animation: pulseCore 1.4s ease-in-out infinite;
        }
        @keyframes disperseGather {
            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.7;
            }
            30% {
                transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.8);
                opacity: 0.35;
            }
            60% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 0.9;
            }
            80% {
                transform: translate(calc(-50% + var(--dx2)), calc(-50% + var(--dy2))) scale(1.3);
                opacity: 0.5;
            }
        }
        @keyframes pulseCore {
            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
            40% {
                transform: translate(-50%, -50%) scale(1.08);
                opacity: 0.85;
            }
            70% {
                transform: translate(-50%, -50%) scale(0.94);
                opacity: 1;
            }
        }
        /* 为每个碎片设置不同的分散方向 */
        .fragment.f1 {
            --dx: 16px;
            --dy: -14px;
            --dx2: -10px;
            --dy2: 8px;
        }
        .fragment.f2 {
            --dx: -15px;
            --dy: -10px;
            --dx2: 12px;
            --dy2: -6px;
        }
        .fragment.f3 {
            --dx: 18px;
            --dy: 6px;
            --dx2: -8px;
            --dy2: -10px;
        }
        .fragment.f4 {
            --dx: -12px;
            --dy: 14px;
            --dx2: 6px;
            --dy2: -12px;
        }
        .fragment.f5 {
            --dx: 8px;
            --dy: 16px;
            --dx2: -14px;
            --dy2: -4px;
        }
        .fragment.f6 {
            --dx: -16px;
            --dy: -6px;
            --dx2: 14px;
            --dy2: 10px;
        }
        .top-bar .ai-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--accent);
        }
        .top-bar .ai-status {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        .top-bar .ai-status.ready {
            color: #8a9e7e;
        }
        .top-bar .ai-status.processing {
            color: #c9a96e;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            50% {
                opacity: 0.4;
            }
        }
        .settings-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--white);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: var(--text-secondary);
            transition: all var(--transition);
            flex-shrink: 0;
        }
        .settings-btn:hover {
            background: #f0ede5;
            color: var(--accent);
        }

        /* 消息区 */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }
        .messages-container::-webkit-scrollbar {
            width: 4px;
        }
        .messages-container::-webkit-scrollbar-thumb {
            background: #e0dbcf;
            border-radius: 10px;
        }
        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: msgIn 0.35s ease-out;
        }
        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message.ai {
            align-self: flex-start;
        }
        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        .message.user .msg-avatar {
            background: #e8e4db;
            color: var(--accent);
            border-radius: 50%;
            clip-path: none;
        }
        .message.ai .msg-avatar {
            background: var(--accent);
            color: #fff;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            font-size: 0.55rem;
        }
        .msg-bubble {
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 0.88rem;
            line-height: 1.55;
            word-break: break-word;
            position: relative;
        }
        .message.user .msg-bubble {
            background: var(--user-msg-bg);
            border: 1px solid #e8e4db;
            border-radius: var(--radius) 4px var(--radius) var(--radius);
            color: var(--text);
        }
        .message.ai .msg-bubble {
            background: var(--ai-msg-bg);
            border: 1px solid #ece8df;
            border-radius: 4px var(--radius) var(--radius) var(--radius);
            color: var(--text);
        }
        .msg-bubble p {
            margin: 0 0 6px;
        }
        .msg-bubble p:last-child {
            margin-bottom: 0;
        }
        .msg-bubble code {
            background: #f3f1ea;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
        }
        .msg-bubble pre {
            background: #f5f3ed;
            padding: 10px 14px;
            border-radius: 8px;
            overflow-x: auto;
            font-family: var(--font-mono);
            font-size: 0.78rem;
            margin: 8px 0;
            border: 1px solid var(--border);
        }
        .msg-time {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 3px;
            padding: 0 4px;
        }

        /* 输入区 */
        .input-area {
            padding: 14px 20px;
            border-top: 1px solid var(--border);
            background: var(--ivory);
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-shrink: 0;
        }
        .input-area textarea {
            flex: 1;
            resize: none;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 16px;
            font-family: var(--font-sans);
            font-size: 0.88rem;
            line-height: 1.5;
            background: var(--white);
            color: var(--text);
            outline: none;
            transition: all var(--transition);
            min-height: 46px;
            max-height: 160px;
        }
        .input-area textarea:focus {
            border-color: #c5bfb2;
            box-shadow: 0 0 0 3px rgba(120, 115, 100, 0.06);
        }
        .input-area textarea::placeholder {
            color: #c5bfb2;
        }
        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            flex-shrink: 0;
        }
        .send-btn:hover {
            background: #4a4a3e;
            transform: scale(1.04);
        }
        .send-btn:disabled {
            background: #c5bfb2;
            cursor: not-allowed;
            transform: none;
        }
        .send-btn:active:not(:disabled) {
            transform: scale(0.94);
        }
        .input-hint {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-align: right;
            padding: 2px 20px 0;
            background: var(--ivory);
        }

        /* ========== 设置弹窗 ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(30, 30, 25, 0.4);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 28px 24px 20px;
            width: 90%;
            max-width: 440px;
            box-shadow: var(--shadow-lg);
            position: relative;
        }
        .modal h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--accent);
        }
        .modal label {
            font-size: 0.78rem;
            color: var(--text-secondary);
            display: block;
            margin-bottom: 4px;
            font-weight: 500;
        }
        .modal input,
        .modal select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-family: var(--font-sans);
            background: var(--ivory);
            color: var(--text);
            outline: none;
            margin-bottom: 12px;
            transition: all var(--transition);
        }
        .modal input:focus,
        .modal select:focus {
            border-color: #c5bfb2;
            box-shadow: 0 0 0 3px rgba(120, 115, 100, 0.05);
        }
        .modal .btn-row {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 8px;
        }
        .modal button {
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--white);
            cursor: pointer;
            font-size: 0.82rem;
            transition: all var(--transition);
            font-family: var(--font-sans);
        }
        .modal button.primary {
            background: var(--accent);
            color: #fff;
            border: none;
        }
        .modal button.primary:hover {
            background: #4a4a3e;
        }
        .modal button:hover {
            background: #f5f2eb;
        }
        .modal .close-modal {
            position: absolute;
            top: 12px;
            right: 16px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal .close-modal:hover {
            color: var(--accent);
            background: #f5f2eb;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.8rem;
            z-index: 60;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
            pointer-events: none;
            white-space: nowrap;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
                transform: translateX(-50%) translateY(-10px);
            }
        }

</head>
