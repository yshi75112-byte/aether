            // ==================== 调用DeepSeek API ====================
            async function callDeepSeekAPI(messages) {
                const settings = loadSettings();
                if (!settings.apiKey) {
                    throw new Error('请先设置DeepSeek API Key');
                }

                let apiUrl = (settings.apiBase || 'https://api.deepseek.com/v1').replace(/\/+$/, '') +
                    '/chat/completions';
                if (settings.proxy) {
                    apiUrl = settings.proxy.replace(/\/+$/, '') + '?url=' + encodeURIComponent(apiUrl);
                }

                const requestBody = {
                    model: settings.model || 'deepseek-chat',
                    messages: messages,
                    temperature: 0.7,
                    max_tokens: 4096,
                    stream: false,
                };

                let response;
                try {
                    response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${settings.apiKey}`,
                        },
                        body: JSON.stringify(requestBody),
                    });
                } catch (networkError) {
                    throw new Error('网络请求失败：请检查网络连接；如果浏览器提示跨域/CORS，请在设置中配置 CORS 代理后重试');
                }

                if (!response.ok) {
                    const errText = await response.text().catch(() => '未知错误');
                    if (response.status === 401) throw new Error('API Key无效，请检查设置');
                    if (response.status === 429) throw new Error('请求过于频繁，请稍后再试');
                    throw new Error(`API错误 (${response.status}): ${errText.substring(0,200)}`);
                }

                const data = await response.json();
                if (!data.choices || !data.choices[0] || !data.choices[0].message) {
                    throw new Error('API返回格式异常');
                }
                const content = data.choices[0].message.content;
                // 调试日志：显示 API 返回的原始内容
                debugLog('🔍 DeepSeek API 返回长度:', content.length);
                debugLog('🔍 是否包含 MEMORY_UPDATE 标记:', content.includes('MEMORY_UPDATE'));
                // 注：记忆解析移至 renderMessage 函数中（通过 applyMemoryUpdate 参数）
                return content;
            }

            // ==================== 发送消息 ====================
            async function sendMessage() {
                if (isProcessing) return;
                const userText = userInput.value.trim();
                if (!userText) return;

                const settings = loadSettings();

                // 禁用输入
                isProcessing = true;
                sendBtn.disabled = true;
                userInput.disabled = true;
                setThinkingState(true);

                // 渲染用户消息
                const userTimestamp = Date.now();
                renderMessage('user', userText, userTimestamp);
                const userMsgForHistory = { role: 'user', content: userText, timestamp: userTimestamp };
                conversationHistory.push(userMsgForHistory);

                const localDeleteResult = applyLocalDeleteIntent(userText);
                const localSaveResult = localDeleteResult.handled
                    ? { handled: false }
                    : applyLocalSaveIntent(userText);
                if (!localDeleteResult.handled && !localSaveResult.handled) {
                    // 也在短期记忆中记录
                    memorySystem.addShortTerm(userText, 'user_message');
                }

                // 清空输入
                userInput.value = '';
                userInput.style.height = 'auto';
                updateMemoryPanel();

                if (localDeleteResult.handled) {
                    const localResponse = localDeleteResult.message || (localDeleteResult.deleted
                        ? '已删除这条记忆。'
                        : '没有找到可删除的记忆。');
                    const aiTimestamp = Date.now();
                    renderMessage('ai', localResponse + '<!--MEMORY_UPDATE:{}-->', aiTimestamp, { applyMemoryUpdate: true });
                    conversationHistory.push({
                        role: 'assistant',
                        content: localResponse,
                        timestamp: aiTimestamp,
                    });
                    persistChatHistory();
                    isProcessing = false;
                    sendBtn.disabled = false;
                    userInput.disabled = false;
                    setThinkingState(false);
                    userInput.focus();
                    updateMemoryPanel();
                    return;
                }

                if (!settings.apiKey) {
                    showToast('⚠ 请先在设置中配置API Key');
                    openSettings();
                    isProcessing = false;
                    sendBtn.disabled = false;
                    userInput.disabled = false;
                    setThinkingState(false);
                    userInput.focus();
                    return;
                }

                // 构建API消息
                const systemPrompt = buildSystemPrompt();
                const memoryPanelContext = buildMemoryPanelDebugContext(userText);
                let codeDebugContext = '';
                try {
                    codeDebugContext = await buildCodeDebugContext(userText, settings);
                } catch (debugError) {
                    debugLog('本地代码检索失败:', debugError);
                    showToast('本地代码检索失败，将继续普通对话');
                }
                
                const apiMessages = [
                    { role: 'system', content: systemPrompt },
                    ...(memoryPanelContext ? [{ role: 'system', content: memoryPanelContext }] : []),
                    ...(codeDebugContext ? [{ role: 'system', content: codeDebugContext }] : []),
                    ...buildApiConversationMessages(),
                ];

                // 创建AI消息占位
                const aiMsgPlaceholder = document.createElement('div');
                aiMsgPlaceholder.className = 'message ai';
                aiMsgPlaceholder.innerHTML = `
                    <div class="msg-avatar">AI</div>
                    <div>
                        <div class="msg-bubble"><p style="color:var(--text-muted);">思考中...</p></div>
                        <div class="msg-time">...</div>
                    </div>
                `;
                messagesContainer.appendChild(aiMsgPlaceholder);
                scrollToBottom();

                try {
                    const aiResponse = await callDeepSeekAPI(apiMessages);

                    // 移除占位
                    if (aiMsgPlaceholder.parentNode) aiMsgPlaceholder.parentNode.removeChild(aiMsgPlaceholder);

                    // 渲染AI回复（会自动处理记忆更新标记）
                    const aiTimestamp = Date.now();
                    debugLog('🔍 AI 返回内容包含 MEMORY_UPDATE:', aiResponse.includes('<!--MEMORY_UPDATE'));
                    debugLog('🔍 AI 返回内容长度:', aiResponse.length);
                    
                    // 手动追加记忆更新标记
                    const aiResponseForRender = aiResponse + ' ';
                    renderMessage('ai', aiResponseForRender, aiTimestamp, { applyMemoryUpdate: true });
                    if (typeof memorySystem.parseMemoryUpdate === 'function') {
                        memorySystem.parseMemoryUpdate(aiResponseForRender);
                    }
                    const cleanAiResponse = stripVisibleTimestampPrefixes(stripMemoryUpdateMarkers(aiResponseForRender));
                    const aiMsgForHistory = { 
                        role: 'assistant', 
                        content: cleanAiResponse,
                        timestamp: aiTimestamp 
                    };
                    conversationHistory.push(aiMsgForHistory);

                    // 同时将AI回复的关键信息存入短期记忆（若标记中已写入短期记忆则跳过，避免重复）
                    const cleanResponse = cleanAiResponse;
                    const memPayload = extractMemoryUpdatePayload(aiResponseForRender);
                    const hasShortTermUpdate = memPayload && memPayload.shortTerm &&
                        (Array.isArray(memPayload.shortTerm) ? memPayload.shortTerm.length > 0 : !!memPayload.shortTerm);
                    if (cleanResponse.length > 10 && !hasShortTermUpdate) {
                        memorySystem.addShortTerm('AI回复要点: ' + cleanResponse.substring(0, 200),
                        'ai_response');
                    }

                    updateMemoryPanel();
                } catch (error) {
                    if (aiMsgPlaceholder.parentNode) aiMsgPlaceholder.parentNode.removeChild(aiMsgPlaceholder);
                    const errorMsg = error.message || '未知错误';
                    renderMessage('ai', '❌ **出错啦**：' + errorMsg + '\n\n请检查网络连接和API设置。', null, { applyMemoryUpdate: true });
                    console.error('API调用失败:', error);
                } finally {
                    isProcessing = false;
                    sendBtn.disabled = false;
                    userInput.disabled = false;
                    setThinkingState(false);
                    userInput.focus();
                    updateMemoryPanel();
                }
            }

            function clearChatHistory() {
                conversationHistory = [];
                conversationSummary = '';
                messagesContainer.innerHTML = '';
                try {
                    localStorage.removeItem(STORAGE_KEYS.CHAT_HISTORY);
                } catch (e) { /* ignore */ }
            }

            function persistChatHistory() {
                try {
                    compactConversationHistory();
                    localStorage.setItem(STORAGE_KEYS.CHAT_HISTORY, JSON.stringify({
                        version: 2,
                        summary: conversationSummary,
                        messages: conversationHistory,
                    }));
                } catch (e) { /* ignore */ }
            }

            function countLongTermEntries() {
                const bi = memorySystem.longTerm.basicInfo || {};
                let n = 0;
                if (bi.age != null && bi.age !== '') n++;
                if (bi.job != null && bi.job !== '') n++;
                n += (bi.pets || []).length;
                n += (bi.tools || []).length;
                n += (memorySystem.longTerm.preferences || []).length;
                n += (memorySystem.longTerm.aiLearning || []).length;
                n += (memorySystem.longTerm.expenses || []).length;
                n += (memorySystem.longTerm.facts || []).length;
                return n;
            }

            function countVolatileEntries() {
                const plans = (memorySystem.volatile.plans || []).filter(p => p && p.content).length;
                const events = (memorySystem.volatile.temporaryEvents || []).filter(e => e && e.content).length;
                return plans + events;
            }

            // ==================== 更新记忆面板 ====================
            function updateMemoryPanel() {
                const memShort = $('#memShort');
                const memLong = $('#memLong');
                const memVolatile = $('#memVolatile');
                const sidebarStats = $('#sidebarStats');
                if (!memShort || !memLong || !memVolatile) return;

                if (sidebarStats) {
                    sidebarStats.textContent = '对话记录 ' + conversationHistory.length + ' 条';
                }

                const sevenDays = 7 * 24 * 60 * 60 * 1000;
                const now = Date.now();
                const storedShortCount = (memorySystem.shortTerm.entries || []).length;
                const allShortEntries = (memorySystem.shortTerm.entries || []).filter(e => {
                    const expiry = e.expiresAt || ((e.timestamp || 0) + sevenDays);
                    return now < expiry;
                });
                const shortCountLabel = storedShortCount + '/' + MAX_SHORT_TERM_ENTRIES;
                const shortEntries = allShortEntries.slice(-20).reverse();
                if (shortEntries.length === 0) {
                    memShort.innerHTML =
                        '<h4><span class="dot dot-short"></span>短期记忆（7天·' + shortCountLabel + '条）</h4>' +
                        '<div class="empty-hint">暂无有效短期记忆（已存 ' + storedShortCount + ' 条）</div>';
                } else {
                    let html = '<h4><span class="dot dot-short"></span>短期记忆（7天·' + shortCountLabel + '条）</h4>';
                    shortEntries.forEach(e => {
                        const text = String(e.content || '');
                        const timeStr = e.timestamp ? new Date(e.timestamp).toLocaleDateString('zh-CN') : '未知';
                        const expiryStr = e.expiresAt ?
                            new Date(e.expiresAt).toLocaleDateString('zh-CN') :
                            new Date((e.timestamp || now) + sevenDays).toLocaleDateString('zh-CN');
                        html += memoryItemHTML(text.substring(0, 120), `${timeStr} · 过期: ${expiryStr}`, {
                            scope: 'shortTerm',
                            content: text,
                        });
                    });
                    memShort.innerHTML = html;
                }

                // 长期记忆
                const bi = memorySystem.longTerm.basicInfo;
                const prefs = memorySystem.longTerm.preferences || [];
                const learning = memorySystem.longTerm.aiLearning || [];
                const expenses = memorySystem.longTerm.expenses || [];
                const facts = memorySystem.longTerm.facts || [];
                const longCount = countLongTermEntries();
                let longHTML = '<h4><span class="dot dot-long"></span>长期记忆（' + longCount + '条）</h4>';
                let hasLong = false;

                const biStr = [];
                if (bi.age) biStr.push('年龄:' + bi.age);
                if (bi.job) biStr.push('工作:' + bi.job);
                if (bi.pets && bi.pets.length > 0) biStr.push('宠物:' + bi.pets.map(p => p.name + '(' + p.type + ')')
                    .join(','));
                if (bi.tools && bi.tools.length > 0) biStr.push('工具:' + bi.tools.join(','));
                if (biStr.length > 0) {
                    if (bi.age) {
                        longHTML += memoryItemHTML('基本信息 年龄: ' + bi.age, '', {
                            scope: 'longTerm',
                            field: 'age',
                            value: bi.age,
                        });
                    }
                    if (bi.job) {
                        longHTML += memoryItemHTML('基本信息 工作: ' + bi.job, '', {
                            scope: 'longTerm',
                            field: 'job',
                            value: bi.job,
                        });
                    }
                    (bi.pets || []).forEach(p => {
                        const petLabel = p && typeof p === 'object'
                            ? (p.name || '未命名') + '(' + (p.type || '宠物') + ')'
                            : String(p || '');
                        longHTML += memoryItemHTML('基本信息 宠物: ' + petLabel, '', {
                            scope: 'longTerm',
                            field: 'pets',
                            value: p,
                        });
                    });
                    (bi.tools || []).forEach(tool => {
                        longHTML += memoryItemHTML('基本信息 工具: ' + tool, '', {
                            scope: 'longTerm',
                            field: 'tools',
                            value: tool,
                        });
                    });
                    hasLong = true;
                }
                if (prefs.length > 0) {
                    prefs.slice(-8).forEach(p => {
                        longHTML += memoryItemHTML('喜好 [' + (p.category || '通用') + '] ' + (p.detail || ''), '', {
                            scope: 'longTerm',
                            category: p.category,
                            detail: p.detail,
                        });
                    });
                    hasLong = true;
                }
                if (learning.length > 0) {
                    learning.slice(-6).forEach(l => {
                        longHTML += memoryItemHTML('AI学习 [' + (l.topic || '通用') + '] ' + (l.content || ''), '', {
                            scope: 'longTerm',
                            topic: l.topic,
                            content: l.content,
                        });
                    });
                    hasLong = true;
                }
                if (facts.length > 0) {
                    facts.slice(-8).forEach(f => {
                        longHTML += memoryItemHTML('长期事实 [' + (f.category || '通用') + '] ' + (f.content || ''), '', {
                            scope: 'longTerm',
                            category: f.category,
                            content: f.content,
                        });
                    });
                    hasLong = true;
                }
                if (expenses.length > 0) {
                    const recentExp = expenses.slice(-5).reverse();
                    recentExp.forEach(e => {
                        longHTML += memoryItemHTML(
                            '近期开销 ' + (e.dateStr || '') + ' ' + (e.amount != null && e.amount !== '' ? '¥' + e.amount : '') + ' ' + (e.description || ''),
                            '',
                            {
                                scope: 'longTerm',
                                dateStr: e.dateStr,
                                amount: e.amount,
                                description: e.description,
                            }
                        );
                    });
                    hasLong = true;
                }
                if (!hasLong) longHTML += '<div class="empty-hint">暂无长期记忆</div>';
                memLong.innerHTML = longHTML;

                // 波动记忆
                const plans = memorySystem.volatile.plans || [];
                const tempEvents = memorySystem.volatile.temporaryEvents || [];
                const volCount = countVolatileEntries();
                let volHTML = '<h4><span class="dot dot-volatile"></span>波动记忆（' + volCount + '条）</h4>';
                let hasVol = false;
                const validPlans = plans.filter(p => p && p.content);
                if (validPlans.length > 0) {
                    validPlans.slice(-8).forEach(p => {
                        volHTML += memoryItemHTML('计划 [' + (p.type || '其他') + '] ' + p.content, '', {
                            scope: 'volatile',
                            type: p.type,
                            content: p.content,
                        });
                    });
                    hasVol = true;
                }
                const active = tempEvents.filter(e => e && e.content && memorySystem._isTempEventActive(e));
                if (active.length > 0) {
                    active.slice(-6).forEach(e => {
                        const expiry = memorySystem._normalizeExpiry(e.estimatedExpiry);
                        const expiryLabel = expiry ?
                            ' · 至' + new Date(expiry).toLocaleDateString('zh-CN') : '';
                        volHTML += memoryItemHTML('临时事件 ' + e.content, expiryLabel || '无过期时间', {
                            scope: 'volatile',
                            content: e.content,
                            estimatedExpiry: e.estimatedExpiry,
                        });
                    });
                    hasVol = true;
                }
                if (!hasVol) volHTML += '<div class="empty-hint">暂无波动记忆</div>';
                memVolatile.innerHTML = volHTML;
            }

            function escapeHTML(str) {
                if (!str) return '';
                return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
            }

            // ==================== 设置弹窗 ====================
            function openSettings() {
                populateSettingsForm();
                settingsModal.style.display = 'flex';
            }

            function closeSettingsModal() {
                settingsModal.style.display = 'none';
            }

            settingsBtn.addEventListener('click', openSettings);
            closeSettings.addEventListener('click', closeSettingsModal);
            cancelSettings.addEventListener('click', closeSettingsModal);
            settingsModal.addEventListener('click', function(e) {
                if (e.target === settingsModal) closeSettingsModal();
            });

            saveSettings.addEventListener('click', function() {
                const newSettings = {
                    apiKey: apiKeyInput.value.trim(),
                    rememberApiKey: persistApiKeyToggle.checked,
                    apiBase: apiBaseInput.value.trim() || 'https://api.deepseek.com/v1',
                    model: modelSelect.value,
                    proxy: proxyInput.value.trim(),
                    autoSave: autoSaveToggle.checked,
                    autoSaveInterval: parseInt(autoSaveInterval.value),
                    debugCodeSearch: debugCodeToggle.checked,
                };
                persistSettings(newSettings);
                appSettings = newSettings;
                closeSettingsModal();
                showToast('✅ 设置已保存');
                updateMemoryPanel();
                // 更新自动保存定时器
                updateAutoSaveTimer();
            });

            // ==================== 辅助函数 ====================
            function formatDateTime() {
                const now = new Date();
                const yyyy = now.getFullYear();
                const MM = String(now.getMonth() + 1).padStart(2, '0');
                const dd = String(now.getDate()).padStart(2, '0');
                const hh = String(now.getHours()).padStart(2, '0');
                const mm = String(now.getMinutes()).padStart(2, '0');
                const ss = String(now.getSeconds()).padStart(2, '0');
                return `${yyyy}${MM}${dd}-${hh}${mm}${ss}`;
            }

            function downloadFile(blob, filename) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
                URL.revokeObjectURL(url);
            }

            // ==================== 自动保存记忆 ====================
            function exportMemoryToFile() {
                compactConversationHistory();
                const data = memorySystem.exportData(conversationHistory, conversationSummary);
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                downloadFile(blob, 'ai-backup-' + formatDateTime() + '.json');
            }

            function updateAutoSaveTimer() {
                // 清除旧的定时器
                if (autoSaveTimer) {
                    clearInterval(autoSaveTimer);
                    autoSaveTimer = null;
                }

                // 如果启用了自动保存，设置新的定时器
                if (appSettings.autoSave && appSettings.autoSaveInterval > 0) {
                    const intervalMs = appSettings.autoSaveInterval * 60 * 1000;
                    autoSaveTimer = setInterval(() => {
                        exportMemoryToFile();
                        showToast('🔄 记忆已自动保存');
                    }, intervalMs);
                    showToast(`⏰ 自动保存已启用（每${appSettings.autoSaveInterval}分钟）`);
                } else {
                    showToast('⏹️ 自动保存已关闭');
                }
            }

            // 初始化时检查是否需要开启自动保存
            updateAutoSaveTimer();

            // ==================== 侧边栏 ====================
            function toggleSidebar() {
                sidebar.classList.toggle('collapsed');
            }
            menuBtn.addEventListener('click', toggleSidebar);
            sidebarClose.addEventListener('click', function() {
                sidebar.classList.add('collapsed');
            });

            // ==================== 记忆面板按钮 ====================
            btnCleanExpired.addEventListener('click', function() {
                memorySystem._cleanExpired();
                memorySystem._saveAll();
                updateMemoryPanel();
                showToast('已清理过期记忆');
            });

            btnExportMem.addEventListener('click', function() {
                compactConversationHistory();
                const data = memorySystem.exportData(conversationHistory, conversationSummary);
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                downloadFile(blob, 'ai-backup-' + formatDateTime() + '.json');
                showToast('记忆已导出');
            });

            btnImportMem.addEventListener('click', function() {
                importFileInput.click();
            });

            importFileInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(event) {
                    try {
                        const imported = JSON.parse(event.target.result);

                        let chatImported = 0;
                        let shortImported = 0;
                        let longImported = 0;
                        let volatileImported = 0;
                        let hasChatChanges = false;
                        let hasSummaryChanges = false;

                        if (imported.chatSummary && typeof imported.chatSummary === 'string') {
                            const existingSummary = conversationSummary
                                ? conversationSummary.split('\n').map(s => s.trim()).filter(Boolean)
                                : [];
                            const importedSummary = imported.chatSummary.split('\n').map(s => s.trim()).filter(Boolean);
                            conversationSummary = existingSummary.concat(importedSummary).slice(-MAX_SUMMARY_ITEMS).join('\n');
                            hasSummaryChanges = importedSummary.length > 0;
                        }

                        if (imported.chatHistory && Array.isArray(imported.chatHistory)) {
                            const existingTimestamps = new Set(conversationHistory.map(m => m.timestamp));
                            let hasOverlappingTimestamps = false;
                            
                            imported.chatHistory.forEach(msg => {
                                if (msg.role && msg.content) {
                                    const timestamp = msg.timestamp || Date.now();
                                    const cleanContent = msg.role === 'assistant' ?
                                        stripMemoryUpdateMarkers(msg.content) : msg.content;
                                    
                                    if (existingTimestamps.has(timestamp)) {
                                        hasOverlappingTimestamps = true;
                                    }
                                    
                                    const existingIndex = conversationHistory.findIndex(m => m.timestamp === timestamp);
                                    if (existingIndex >= 0) {
                                        conversationHistory[existingIndex] = {
                                            role: msg.role,
                                            content: cleanContent,
                                            timestamp: timestamp
                                        };
                                    } else {
                                        conversationHistory.push({
                                            role: msg.role,
                                            content: cleanContent,
                                            timestamp: timestamp
                                        });
                                        chatImported++;
                                    }
                                }
                            });
                            
                            if (chatImported > 0 || hasOverlappingTimestamps) {
                                conversationHistory.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
                                persistChatHistory();
                                hasChatChanges = true;
                            }
                        }

                        if (imported.shortTerm && imported.shortTerm.entries) {
                            const existingShort = new Set(memorySystem.shortTerm.entries.map(e => e.content));
                            imported.shortTerm.entries.forEach(entry => {
                                if (!existingShort.has(entry.content)) {
                                    memorySystem.shortTerm.entries.push(entry);
                                    shortImported++;
                                    existingShort.add(entry.content);
                                }
                            });
                            if (memorySystem.shortTerm.entries.length > MAX_SHORT_TERM_ENTRIES) {
                                memorySystem.shortTerm.entries.sort((a, b) => b.timestamp - a.timestamp);
                                memorySystem.shortTerm.entries =
                                    memorySystem.shortTerm.entries.slice(0, MAX_SHORT_TERM_ENTRIES);
                            }
                        }

                        if (imported.longTerm) {
                            if (imported.longTerm.expenses) {
                                const existingExpenses = new Set(memorySystem.longTerm.expenses.map(e => 
                                    e.dateStr + '-' + e.amount + '-' + e.description
                                ));
                                imported.longTerm.expenses.forEach(exp => {
                                    const key = (exp.dateStr || '') + '-' + (exp.amount || '') + '-' + (exp.description || '');
                                    if (!existingExpenses.has(key)) {
                                        memorySystem.longTerm.expenses.push(exp);
                                        longImported++;
                                        existingExpenses.add(key);
                                    }
                                });
                            }
                            if (imported.longTerm.preferences) {
                                imported.longTerm.preferences.forEach(pref => {
                                    const dup = memorySystem.longTerm.preferences.find(p =>
                                        p.category === pref.category && p.detail === pref.detail
                                    );
                                    if (!dup) {
                                        memorySystem.longTerm.preferences.push(pref);
                                        longImported++;
                                    }
                                });
                            }
                            if (imported.longTerm.basicInfo) {
                                Object.keys(imported.longTerm.basicInfo).forEach(key => {
                                    if (imported.longTerm.basicInfo[key] !== null && 
                                        imported.longTerm.basicInfo[key] !== undefined) {
                                        if (Array.isArray(imported.longTerm.basicInfo[key])) {
                                            if (!memorySystem.longTerm.basicInfo[key]) {
                                                memorySystem.longTerm.basicInfo[key] = [];
                                            }
                                            imported.longTerm.basicInfo[key].forEach(item => {
                                                if (key === 'pets' && item && item.name) {
                                                    const exists = memorySystem.longTerm.basicInfo.pets.find(p =>
                                                        p.name === item.name && p.type === (item.type || '未知')
                                                    );
                                                    if (!exists) {
                                                        memorySystem.longTerm.basicInfo.pets.push({
                                                            name: item.name,
                                                            type: item.type || '未知'
                                                        });
                                                        longImported++;
                                                    }
                                                } else if (key === 'tools' && typeof item === 'string') {
                                                    if (!memorySystem.longTerm.basicInfo.tools.includes(item)) {
                                                        memorySystem.longTerm.basicInfo.tools.push(item);
                                                        longImported++;
                                                    }
                                                } else if (!memorySystem.longTerm.basicInfo[key].includes(item)) {
                                                    memorySystem.longTerm.basicInfo[key].push(item);
                                                    longImported++;
                                                }
                                            });
                                        } else if (!memorySystem.longTerm.basicInfo[key]) {
                                            memorySystem.longTerm.basicInfo[key] = imported.longTerm.basicInfo[key];
                                            longImported++;
                                        }
                                    }
                                });
                            }
                            if (imported.longTerm.aiLearning) {
                                imported.longTerm.aiLearning.forEach(learn => {
                                    const dup = memorySystem.longTerm.aiLearning.find(l =>
                                        l.topic === learn.topic
                                    );
                                    if (!dup) {
                                        memorySystem.longTerm.aiLearning.push(learn);
                                        longImported++;
                                    }
                                });
                            }
                            if (imported.longTerm.facts) {
                                if (!Array.isArray(memorySystem.longTerm.facts)) memorySystem.longTerm.facts = [];
                                imported.longTerm.facts.forEach(fact => {
                                    if (!fact || !fact.content) return;
                                    const dup = memorySystem.longTerm.facts.find(f =>
                                        f.category === fact.category && f.content === fact.content
                                    );
                                    if (!dup) {
                                        memorySystem.longTerm.facts.push({
                                            category: fact.category || '通用',
                                            content: fact.content,
                                            timestamp: fact.timestamp || Date.now(),
                                        });
                                        longImported++;
                                    }
                                });
                            }
                        }

                        if (imported.volatile) {
                            if (imported.volatile.plans) {
                                imported.volatile.plans.forEach(plan => {
                                    const dup = memorySystem.volatile.plans.find(p =>
                                        p.type === plan.type && p.content === plan.content
                                    );
                                    if (!dup) {
                                        memorySystem.volatile.plans.push(plan);
                                        volatileImported++;
                                    }
                                });
                            }
                            if (imported.volatile.temporaryEvents) {
                                imported.volatile.temporaryEvents.forEach(evt => {
                                    if (!evt || !evt.content) return;
                                    const dup = memorySystem.volatile.temporaryEvents.find(e =>
                                        e.content === evt.content
                                    );
                                    if (!dup) {
                                        memorySystem.volatile.temporaryEvents.push({
                                            content: evt.content,
                                            createdAt: evt.createdAt || Date.now(),
                                            estimatedExpiry: memorySystem._normalizeExpiry(evt.estimatedExpiry),
                                        });
                                        volatileImported++;
                                    }
                                });
                            }
                        }

                        if (hasChatChanges || hasSummaryChanges) {
                            persistChatHistory();
                        }
                        memorySystem._saveAll();
                        updateMemoryPanel();

                        if (hasChatChanges) {
                            messagesContainer.innerHTML = '';
                            conversationHistory.forEach(msg => {
                                if (msg.role === 'user' || msg.role === 'assistant') {
                                    const role = msg.role === 'assistant' ? 'ai' : 'user';
                                    renderMessage(role, msg.content, msg.timestamp);
                                }
                            });
                        }

                        let msg = '导入完成：';
                        if (chatImported > 0) msg += `对话${chatImported}条、`;
                        if (shortImported > 0) msg += `短期${shortImported}条、`;
                        if (longImported > 0) msg += `长期${longImported}条、`;
                        if (volatileImported > 0) msg += `波动${volatileImported}条、`;
                        if (chatImported === 0 && shortImported === 0 && longImported === 0 && volatileImported === 0) {
                            msg = '未导入新数据（可能已存在或格式无效）';
                        } else {
                            msg = msg.replace(/、$/, '');
                        }
                        showToast(msg);
                    } catch (err) {
                        console.error('导入失败:', err);
                        showToast('导入失败：文件格式错误');
                    }
                };
                reader.readAsText(file);
                importFileInput.value = '';
            });

            btnClearAllMem.addEventListener('click', function() {
                if (confirm('确定要清空全部记忆吗？此操作不可撤销。')) {
                    memorySystem.clearAll();
                    clearSelectedMemory();
                    clearChatHistory();
                    updateMemoryPanel();
                    showToast('全部记忆已清空');
                }
            });

            function selectMemoryItemElement(item) {
                if (!item || !item.dataset.memoryTarget) return;
                try {
                    const target = JSON.parse(decodeURIComponent(item.dataset.memoryTarget));
                    const label = decodeURIComponent(item.dataset.memoryLabel || '');
                    setSelectedMemory(createMemorySelection(label, target));
                } catch (error) {
                    console.warn('记忆选择解析失败:', error);
                    showToast('选中记忆失败，请刷新后重试');
                }
            }

            sidebarContent.addEventListener('click', function(e) {
                const item = e.target.closest('.mem-item[data-memory-target]');
                if (!item || !sidebarContent.contains(item)) return;
                selectMemoryItemElement(item);
            });

            sidebarContent.addEventListener('keydown', function(e) {
                if (e.key !== 'Enter' && e.key !== ' ') return;
                const item = e.target.closest('.mem-item[data-memory-target]');
                if (!item || !sidebarContent.contains(item)) return;
                e.preventDefault();
                selectMemoryItemElement(item);
            });

            // ==================== 输入处理 ====================
            userInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 160) + 'px';
            });

            userInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            sendBtn.addEventListener('click', sendMessage);
            window.addEventListener('aether-memory-updated', updateMemoryPanel);

            // ==================== 初始化 ====================
            function init() {
                populateSettingsForm();
                updateMemoryPanel();
                userInput.focus();
                warnAboutUnsafeOrigin();

                // 加载缓存的对话历史
                try {
                    const cached = localStorage.getItem(STORAGE_KEYS.CHAT_HISTORY);
                    if (cached) {
                        const parsed = JSON.parse(cached);
                        if (Array.isArray(parsed) && parsed.length > 0) {
                            conversationHistory = parsed;
                        } else if (parsed && Array.isArray(parsed.messages)) {
                            conversationHistory = parsed.messages;
                            conversationSummary = typeof parsed.summary === 'string' ? parsed.summary : '';
                        }
                        if (conversationHistory.length > 0) {
                            compactConversationHistory();
                            // 渲染缓存的对话
                            conversationHistory.forEach(msg => {
                                if (msg.role === 'user' || msg.role === 'assistant') {
                                    const role = msg.role === 'assistant' ? 'ai' : 'user';
                                    renderMessage(role, msg.content, msg.timestamp);
                                }
                            });
                            persistChatHistory();
                        }
                    }
                } catch (e) { /* ignore */ }

                // 定期保存对话历史
                setInterval(persistChatHistory, 5000);

                // 定期清理过期记忆
                setInterval(() => {
                    memorySystem._cleanExpired();
                    memorySystem._saveAll();
                    updateMemoryPanel();
                }, 60000);

                debugLog('🧠 AI记忆聊天系统已就绪');
                debugLog('  - 最近对话:', conversationHistory.length, '/', MAX_STORED_CHAT_MESSAGES, '条');
                debugLog('  - 历史摘要:', conversationSummary ? conversationSummary.split('\n').length : 0, '条');
                debugLog('  - 短期记忆:', memorySystem.shortTerm.entries.length, '/', MAX_SHORT_TERM_ENTRIES, '条');
                debugLog('  - 长期记忆:', countLongTermEntries(), '条');
                debugLog('  - 波动记忆:', countVolatileEntries(), '条');
            }

            // 页面卸载前保存
            window.addEventListener('beforeunload', persistChatHistory);

            // ==================== 移动端手势 ====================
            let touchStartX = 0;
            document.addEventListener('touchstart', function(e) {
                touchStartX = e.touches[0].clientX;
            }, { passive: true });
            document.addEventListener('touchend', function(e) {
                const diff = e.changedTouches[0].clientX - touchStartX;
                if (diff > 60 && touchStartX < 30 && window.innerWidth <= 768) {
                    // 从左边缘右滑 -> 打开侧边栏
                    sidebar.classList.remove('collapsed');
                }
                if (diff < -40 && !sidebar.classList.contains('collapsed') && window.innerWidth <= 768) {
                    // 左滑 -> 关闭侧边栏
                    sidebar.classList.add('collapsed');
                }
            });

            // 测试与本地调试入口
            window.renderMessage = renderMessage;
            window.updateMemoryPanel = updateMemoryPanel;
            window.selectedMemory = selectedMemory;
            window.memorySystem.countLongTermEntries = countLongTermEntries;
            window.memorySystem.countVolatileEntries = countVolatileEntries;
            window.aetherDebug = {
                buildApiConversationMessages,
                compactConversationHistory,
                applyLocalDeleteIntent,
                applyLocalSaveIntent,
                getSelectedMemory: () => selectedMemory,
                clearSelectedMemory,
                getConversationSummary: () => conversationSummary,
            };

            // 启动
            init();
        })();
    </script>
</body>
</html>
